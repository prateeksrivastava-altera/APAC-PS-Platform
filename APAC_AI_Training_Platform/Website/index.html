                      <button class="mini-btn remove-item-btn" data-phase-index="${idx}" data-item-index="${itemIdx}" type="button">Remove</button>
                    </div>
                  `).join('') || '<div class="training-desc">No activities yet.</div>'}
                </div>
              </div>
            `).join('') || '<div class="muted-box" style="min-height:120px;">No phases yet. Add your first phase to begin.</div>'}
          </div>
        </div>
      `;
    }

    function renderAssessmentConfig(item, phaseIdx, itemIdx) {
      const assessment = item.assessment || { passingMarks: '', durationMinutes: '', maxRetries: '', questions: [] };
      const questions = assessment.questions || [];
      const assessmentCollapsed = !!assessment.collapsed;
      return `
        <div class="assessment-block ${assessmentCollapsed ? 'is-collapsed' : ''}">
          <div class="assessment-header">
            <div>
              <div class="assessment-footer-label">Assessment Builder</div>
              <div class="assessment-section-title">Questions and answer options <button class="collapse-btn assessment-collapse-toggle" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" type="button">${collapseArrow(assessmentCollapsed)}</button></div>
            </div>
            <div class="assessment-header-actions">
              <div class="assessment-total-wrap">
                <span class="assessment-total-caption">Assessment Total Marks</span>
                <input class="assessment-total-input" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" type="number" value="${getAssessmentTotalMarks(assessment)}" readonly>
              </div>
              <button class="light-btn add-question-btn" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" type="button">Add Question</button>
            </div>
          </div>
          ${questions.map((q, qIdx) => `
            <div class="assessment-question ${q.collapsed ? 'is-collapsed' : ''}" data-question-index="${qIdx}" draggable="true" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}">
              <div class="assessment-question-head">
                <div class="assessment-question-label"><span class="assessment-drag-handle">::</span> <span>Question ${qIdx + 1}</span> <button class="collapse-btn assessment-question-collapse-toggle" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" type="button">${collapseArrow(!!q.collapsed)}</button></div>
                <div class="assessment-marking">
                  <div class="assessment-marking-toggle">
                    <button class="assessment-marking-btn mode-combined ${q.markingMode !== 'individual' ? 'active' : ''}" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-mode="combined" type="button">Combined Marking</button>
                    <button class="assessment-marking-btn mode-individual ${q.markingMode === 'individual' ? 'active' : ''}" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-mode="individual" type="button">Individual Marking</button>
                  </div>
                  <input class="assessment-marking-input assess-question-marks" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" type="number" min="0" step="any" value="${q.markingMode === 'individual' ? getQuestionIndividualMarks(q) : (q.combinedMarks || '')}" ${q.markingMode === 'individual' ? 'disabled' : ''}>
                </div>
              </div>
              <div class="assessment-top">
                <input class="assess-question-text" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" placeholder="Question" maxlength="200" value="${q.text || ''}">
                <button class="tiny-btn move-question-btn" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-dir="up" type="button">Up</button>
                <button class="tiny-btn move-question-btn" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-dir="down" type="button">Down</button>
                <button class="tiny-btn remove-question-btn" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" type="button">Remove</button>
              </div>
              <div class="assessment-options">
                ${(q.options || []).map((opt, optIdx) => `
                  <div class="assessment-option">
                    <div class="assessment-option-label">Option ${optIdx + 1}</div>
                    <input class="assess-option-text" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-option-index="${optIdx}" placeholder="Option text" maxlength="50" value="${opt.text || ''}">
                    ${q.markingMode === 'individual' ? `<input class="assessment-option-marks assess-option-marks" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-option-index="${optIdx}" type="number" min="0" step="any" value="${opt.markValue || ''}" ${opt.correct ? '' : 'disabled'}>` : '<span></span>'}
                    <label class="training-desc">
                      <input class="assess-option-correct" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-option-index="${optIdx}" type="checkbox" ${opt.correct ? 'checked' : ''}>
                      Correct
                    </label>
                    <button class="tiny-btn remove-option-btn" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" data-option-index="${optIdx}" type="button">Remove</button>
                  </div>
                `).join('')}
                <button class="light-btn add-option-btn" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" data-question-index="${qIdx}" type="button">Add Option</button>
              </div>
            </div>
          `).join('') || '<div class="training-desc" style="margin-top:6px;">No questions yet.</div>'}
          <div class="assessment-footer">
            <div class="assessment-footer-card">
              <div class="assessment-footer-display">PASSING MARKS</div>
              <div class="assessment-footer-input-wrap"><input class="assessment-footer-input item-assess-pass" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" type="number" min="0" step="any" placeholder="" value="${assessment.passingMarks || ''}"></div>
            </div>
            <div class="assessment-footer-card">
              <div class="assessment-footer-display">TIME LIMIT</div>
              <div class="assessment-footer-input-wrap"><input class="assessment-footer-input item-assess-duration" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" type="number" min="0" step="any" placeholder="" value="${assessment.durationMinutes || ''}"></div>
            </div>
            <div class="assessment-footer-card">
              <div class="assessment-footer-display">MAX RETRIES <span class="hover-help" title="Leave Max Retries blank to allow unlimited retries. If you enter a number, the learner can retry only that many times before the full training restarts.">?</span></div>
              <div class="assessment-footer-input-wrap"><input class="assessment-footer-input item-assess-retries" data-phase-index="${phaseIdx}" data-item-index="${itemIdx}" type="number" min="0" step="1" placeholder="" value="${assessment.maxRetries || ''}"></div>
            </div>
          </div>
        </div>
      `;
    }

    function bindAdminTrainingBuilder() {
      const roleSelect = el('admin-role-select');
      const roleNew = el('admin-role-new');
      const nameEl = el('admin-train-name');
      const descEl = el('admin-train-desc');
      const createdByEl = el('admin-train-createdBy');
      const mentorSel = el('admin-train-mentor');
      const mentorFolderSel = el('admin-train-mentor-folder');
      const clearBtn = el('clear-draft-btn');
      if (roleSelect) roleSelect.onchange = () => adminDraftTraining.roleSelect = roleSelect.value;
      if (roleNew) roleNew.oninput = () => adminDraftTraining.roleNew = roleNew.value;
      if (nameEl) nameEl.oninput = () => adminDraftTraining.name = nameEl.value;
      if (descEl) descEl.oninput = () => adminDraftTraining.description = descEl.value;
      if (createdByEl) createdByEl.oninput = () => {
        adminDraftTraining.createdByEmail = normalizeEmail(createdByEl.value);
        adminDraftTraining.contributorEmails = resolveDraftContributorEmails(adminDraftTraining.createdByEmail);
        renderAdminTrainings();
      };
      if (mentorSel) mentorSel.onchange = () => {
        adminTrainingMentorMissionId = mentorSel.value;
        adminTrainingMentorFolderId = '';
        renderAdminTrainings();
      };
      if (mentorFolderSel) mentorFolderSel.onchange = () => adminTrainingMentorFolderId = mentorFolderSel.value;
      if (clearBtn) clearBtn.onclick = () => { clearAdminDraft(); renderAdminTrainings(); };
      document.querySelectorAll('.admin-train-contributor').forEach(input => {
        input.onchange = () => {
          adminDraftTraining.contributorEmails = resolveDraftContributorEmails(adminDraftTraining.createdByEmail);
        };
      });

      const addPhaseBtn = el('add-phase-btn');
      if (addPhaseBtn) addPhaseBtn.onclick = () => {
        adminDraftTraining.phases.push({ id: `phase-${Date.now()}`, name: `Phase ${adminDraftTraining.phases.length + 1}`, items: [] });
        renderAdminTrainings();
      };

      document.querySelectorAll('.phase-name-input').forEach(input => {
        input.oninput = () => {
          const idx = Number(input.dataset.phaseIndex);
          if (adminDraftTraining.phases[idx]) adminDraftTraining.phases[idx].name = input.value;
        };
      });

          const item = adminDraftTraining.phases[phaseIdx]?.items?.[itemIdx];
          if (!item || !item.assessment) return;
          const list = item.assessment.questions || [];
          const nextIdx = dir === 'up' ? qIdx - 1 : qIdx + 1;
          if (nextIdx < 0 || nextIdx >= list.length) return;
          const temp = list[qIdx];
          list[qIdx] = list[nextIdx];
          list[nextIdx] = temp;
          renderAdminTrainings();
        };

          if (!question || question.markingMode === 'individual') return;

      document.querySelectorAll('.assessment-question').forEach(questionEl => {
        questionEl.addEventListener('dragstart', () => {
          dragState = {
            phaseIndex: Number(questionEl.dataset.phaseIndex),
            itemIndex: Number(questionEl.dataset.itemIndex),
            questionIndex: Number(questionEl.dataset.questionIndex),

          questionEl.classList.add('dragging');

        questionEl.addEventListener('dragend', () => {
          questionEl.classList.remove('dragging');
          dragState = null;
        });
        questionEl.addEventListener('dragover', (event) => {
          if (!dragState || dragState.dragType !== 'assessment-question') return;
          event.preventDefault();
        });
        questionEl.addEventListener('drop', () => {
          if (!dragState || dragState.dragType !== 'assessment-question') return;
          const phaseIdx = Number(questionEl.dataset.phaseIndex);
          const itemIdx = Number(questionEl.dataset.itemIndex);
          const targetQuestionIndex = Number(questionEl.dataset.questionIndex);
          if (dragState.phaseIndex !== phaseIdx || dragState.itemIndex !== itemIdx) return;
          const item = adminDraftTraining.phases[phaseIdx]?.items?.[itemIdx];
          const questions = item?.assessment?.questions || [];
          if (!questions.length || dragState.questionIndex === targetQuestionIndex) return;
          const [moved] = questions.splice(dragState.questionIndex, 1);
          const insertIndex = targetQuestionIndex > dragState.questionIndex ? targetQuestionIndex - 1 : targetQuestionIndex;
          questions.splice(insertIndex, 0, moved);
          renderAdminTrainings();
        });
      });

          const file = input.files && input.files[0];
          if (!item || !file) return;
          item.pendingFileName = file.name;
          pendingUploadFiles[item.id] = file;
          renderAdminTrainings();
        };
      });

      document.querySelectorAll('.upload-file-btn').forEach(btn => {
        btn.onclick = async () => {
          const phaseIdx = Number(btn.dataset.phaseIndex);
          const itemIdx = Number(btn.dataset.itemIndex);
          const item = adminDraftTraining.phases[phaseIdx]?.items?.[itemIdx];
          if (!item || !item.pendingFileName) return;
          const file = pendingUploadFiles[item.id];
          if (!file) return alert('Please choose a file first.');
          const isVideo = item.type === 'video';
          try {
            const result = await uploadResource(isVideo ? 'video' : 'document', file);
            const storedName = result.fileName || item.pendingFileName;
            item.fileName = storedName;
            item.pendingFileName = '';
            delete pendingUploadFiles[item.id];
            const list = isVideo ? videoLibrary : pdfLibrary;
            if (!list.includes(storedName)) list.push(storedName);
            saveLibrary(isVideo ? VIDEO_LIBRARY_KEY : PDF_LIBRARY_KEY, list);
            alert(`${isVideo ? 'Video' : 'Document'} uploaded and linked.`);
            renderAdminTrainings();
          } catch {
            alert('Upload failed. Please try again.');
          }
        };
      });

      document.querySelectorAll('.phase-item').forEach(itemEl => {
        itemEl.ondragstart = (e) => {
          dragState = { phaseIndex: Number(itemEl.dataset.phaseIndex), itemIndex: Number(itemEl.dataset.itemIndex) };
          itemEl.classList.add('dragging');
          if (e.dataTransfer) e.dataTransfer.effectAllowed = 'move';
        };
        itemEl.ondragend = () => {
          itemEl.classList.remove('dragging');
          dragState = null;
        };
      });

      document.querySelectorAll('.phase-items').forEach(listEl => {
        listEl.ondragover = (e) => {
          e.preventDefault();
          if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
        };
        listEl.ondrop = (e) => {
          e.preventDefault();
          if (!dragState) return;
          const targetPhase = Number(listEl.dataset.phaseIndex);
          if (dragState.phaseIndex !== targetPhase) return;
          const items = adminDraftTraining.phases[targetPhase]?.items || [];
          if (!items.length) return;
          const itemEls = Array.from(listEl.querySelectorAll('.phase-item'));
          const targetIndex = getDropIndex(itemEls, e.clientY);
          const [moved] = items.splice(dragState.itemIndex, 1);
          const insertIndex = targetIndex > dragState.itemIndex ? targetIndex - 1 : targetIndex;
          items.splice(insertIndex, 0, moved);
          renderAdminTrainings();
        };
      });
    }

    function getDropIndex(itemEls, clientY) {
      if (!itemEls.length) return 0;
      const matchIndex = itemEls.findIndex(el => clientY < el.getBoundingClientRect().top + el.offsetHeight / 2);
      return matchIndex === -1 ? itemEls.length : matchIndex;
    }

    function getContributorCandidates(creatorEmail='') {
      const creator = normalizeEmail(creatorEmail);
      const eligibleUsers = loadUsers()
        .filter(user => {
          const accessType = normalizeAccessType(user.accessType);
          return accessType === 'trainer' || accessType === 'admin';
        })
        .map(user => ({
          email: normalizeEmail(user.email),
          name: user.name || user.email || '',
          accessType: normalizeAccessType(user.accessType)
        }))
        .filter(user => user.email);
      if (creator && !eligibleUsers.some(user => user.email === creator)) {
        eligibleUsers.push({
          email: creator,
          name: creator,
          accessType: 'trainer'
        });
      }
      return eligibleUsers.sort((a, b) => (a.name || a.email).localeCompare(b.name || b.email));
    }

    function resolveDraftContributorEmails(creatorEmail='') {
      const creator = normalizeEmail(creatorEmail || adminDraftTraining.createdByEmail || currentUserEmail());
      const selected = Array.from(document.querySelectorAll('.admin-train-contributor:checked'))
        .map(input => normalizeEmail(input.value))
        .filter(Boolean);
      if (creator) selected.push(creator);
      return Array.from(new Set(selected));
    }

    function bindAdminUserEditor() {
      const backdrop = el('admin-user-modal-backdrop');
      if (!backdrop) return;
      backdrop.onclick = (event) => {
        if (event.target === backdrop) closeAdminUserEditor();
      };
    }

    function closeConfirmDialog() {
      state.confirmDialog = null;
      render();
    }

    function bindConfirmDialog() {
      const backdrop = el('confirm-dialog-backdrop');
      if (!backdrop) return;
      const close = () => closeConfirmDialog();
      backdrop.onclick = (event) => {
        if (event.target === backdrop) close();
      };
      if (el('confirm-dialog-close')) el('confirm-dialog-close').onclick = close;
      if (el('confirm-dialog-cancel')) el('confirm-dialog-cancel').onclick = close;
      if (el('confirm-dialog-confirm')) {
        el('confirm-dialog-confirm').onclick = () => {
          const action = state.confirmDialog?.onConfirm;
          state.confirmDialog = null;
          if (typeof action === 'function') action();
        };
      }
    }

    function bindTrainingManagementHelpDialog() {
      const backdrop = el('training-help-backdrop');
      if (!backdrop) return;
      backdrop.onclick = (event) => {
        if (event.target === backdrop) closeTrainingManagementHelp();
      };
    }

    // Admin actions
    window.editUser = async (email) => {
      await ensureUsersLoaded();
      const u = loadUsers().find(x => normalizeEmail(x.email) === normalizeEmail(email));
      if (!u) return alert('User not found.');
      openAdminUserEditor(u);
    };
    window.closeAdminUserEditor = closeAdminUserEditor;
    window.saveAdminUserEdit = async () => {
      if (!adminUserEditDraft) return;
      const email = normalizeEmail(el('admin-user-email')?.value || '');
      const name = (el('admin-user-name')?.value || '').trim();
      const title = (el('admin-user-title')?.value || '').trim();
      const managerEmail = normalizeEmail(el('admin-user-managerEmail')?.value || '');
      const accessType = normalizeAccessType(el('admin-user-accessType')?.value || 'trainee');
      if (!email) return alert('Email is required.');
      if (!name) return alert('Name is required.');
      const payload = {
        ...loadUsers().find(x => normalizeEmail(x.email) === normalizeEmail(adminUserEditDraft.originalEmail)),
        email,
        name,
        title,
        managerEmail,
        accessType,
        originalEmail: adminUserEditDraft.originalEmail
      };
      try {
        await updateUser(payload);
        adminUserEditDraft = null;
        render();
      } catch (error) {
        alert(error.message || 'User update failed.');
      }
    };
    window.deleteUser = async (email) => {
      if (!confirm('Delete this user?')) return;
      try {
        await removeUser(email);
        if (adminUserEditDraft && normalizeEmail(adminUserEditDraft.originalEmail) === normalizeEmail(email)) {
          adminUserEditDraft = null;
        }
        render();
      } catch {
        alert('User delete failed.');
      }
    };

    window.addTemplateTraining = () => {
      const role = (adminDraftTraining.roleNew || adminDraftTraining.roleSelect || '').trim();
      if (!role) return alert('Enter or select a role.');
      const name = (adminDraftTraining.name || '').trim();
      if (!name) return alert('Enter a training name.');
      const phases = (adminDraftTraining.phases || []).map(phase => ({
        id: phase.id || `phase-${Date.now()}`,
        name: (phase.name || '').trim(),
        items: (phase.items || []).map(item => ({
          id: item.id || `item-${Date.now()}`,
          type: item.type,
          source: item.source || '',
          url: item.url || '',
          fileName: item.fileName || '',
          textContent: item.textContent || '',
          lmsLink: item.lmsLink || '',
          handsonText: item.handsonText || '',
          missionId: item.missionId || '',
          mentorTopic: item.mentorTopic || '',
          assessment: normalizeAssessment(item.assessment),
          collapsed: !!item.collapsed
        }))
      })).filter(phase => phase.name);
      if (!phases.length) return alert('Enter at least one phase with a name.');
      const missingMediaConfig = phases.some(phase => (phase.items || []).some(item => {
        if (item.type !== 'video' && item.type !== 'doc') return false;
        if (!item.source) return true;
        if (item.source === 'url' && !item.url) return true;
        if (item.source === 'upload' && !item.fileName) return true;
        if (item.source === 'library' && !item.fileName) return true;
        return false;
      }));
      if (missingMediaConfig) return alert('Video and documentation items need a source and link or file selection.');
      const missingLmsLink = phases.some(phase => (phase.items || []).some(item => item.type === 'lms' && !item.lmsLink));
      if (missingLmsLink) return alert('LMS/Workday items need a course link.');
      const missingHandson = phases.some(phase => (phase.items || []).some(item => item.type === 'handson' && !item.handsonText));
      if (missingHandson) return alert('Hands-on items need a description.');
      const missingMentorSession = phases.some(phase => (phase.items || []).some(item => item.type === 'ai-chat' && (!item.missionId || !item.mentorTopic)));
      if (missingMentorSession) return alert('Mentor session items need a Matcha mission and topic.');
      const desc = (adminDraftTraining.description || '').trim();
      const id = adminDraftTraining.editingId || slugify(`${role}-${name}`);
      const createdByEmail = normalizeEmail(el('admin-train-createdBy')?.value || adminDraftTraining.createdByEmail || currentUserEmail());
      const contributorEmails = resolveDraftContributorEmails(createdByEmail);
      const list = roleTrainingTemplates[role] || [];
      if (adminDraftTraining.editingId && adminDraftTraining.originalRole && adminDraftTraining.originalRole !== role) {
        const originalList = (roleTrainingTemplates[adminDraftTraining.originalRole] || []).filter(t => t.id !== adminDraftTraining.editingId);
        roleTrainingTemplates[adminDraftTraining.originalRole] = originalList;
      }
      const existing = list.find(t => t.id === id);
      const mentorMissionId = adminTrainingMentorMissionId || '';
      const mentorFolderId = adminTrainingMentorFolderId || '';
      if (existing) {
        existing.name = name; existing.description = desc; existing.phases = phases; existing.mentorMissionId = mentorMissionId; existing.mentorFolderId = mentorFolderId; existing.createdByEmail = createdByEmail || existing.createdByEmail || currentUserEmail(); existing.contributorEmails = contributorEmails;
      } else {
        list.push({ id, name, description: desc, phases, mentorMissionId, mentorFolderId, createdByEmail: createdByEmail || currentUserEmail(), contributorEmails });
      }
      const updated = { ...roleTrainingTemplates, [role]: list };
      saveTemplates(updated);
      clearAdminDraft();
      render();
    };

    window.editTemplateTraining = (role, id) => {
      const list = roleTrainingTemplates[role] || [];
      const t = list.find(x => x.id === id);
      if (!t) return alert('Training not found.');
      if (!canEditTrainingTemplate(t)) return alert('You can only edit trainings you created or contribute to.');
      adminDraftTraining = {
        editingId: t.id,
        originalRole: role,
        roleSelect: role,
        roleNew: '',
        name: t.name || '',
        description: t.description || '',
        createdByEmail: t.createdByEmail || '',
        contributorEmails: Array.from(new Set([t.createdByEmail || '', ...(Array.isArray(t.contributorEmails) ? t.contributorEmails : [])].map(normalizeEmail).filter(Boolean))),
        phases: (t.phases || []).map(phase => ({
          id: phase.id || `phase-${Date.now()}`,
          name: phase.name || '',
          items: (phase.items || []).map(item => ({
            id: item.id || `item-${Date.now()}`,
            type: item.type || 'doc',
            source: item.source || '',
            url: item.url || '',
            fileName: item.fileName || '',
            pendingFileName: '',
            textContent: item.textContent || '',
            lmsLink: item.lmsLink || '',
            handsonText: item.handsonText || '',
            missionId: item.missionId || '',
            mentorTopic: item.mentorTopic || '',
            assessment: normalizeAssessment(item.assessment),
            collapsed: !!item.collapsed
          }))
        }))
      };
      adminTrainingMentorMissionId = t.mentorMissionId || '';
      adminTrainingMentorFolderId = t.mentorFolderId || '';
      renderAdminTrainings();
      window.scrollTo(0, 0);
    };

    window.deleteTemplateTraining = (role, id) => {
      const sourceList = roleTrainingTemplates[role] || [];
      const target = sourceList.find(t => t.id === id);
      if (target && !canEditTrainingTemplate(target)) return alert('You can only delete trainings you created or contribute to.');
      state.confirmDialog = {
        title: 'Delete Training',
        message: `Delete "${target?.name || 'this training'}"? This cannot be undone.`,
        confirmLabel: 'Delete Training',
        onConfirm: () => {
          const list = sourceList.filter(t => t.id !== id);
          const updated = { ...roleTrainingTemplates, [role]: list };
          saveTemplates(updated);
          render();
        }
      };
      render();
    };

    window.deleteRole = (role) => {
      if (!hasAdminAccess()) return alert('Only admins can delete an entire training role.');
      state.confirmDialog = {
        title: 'Delete Role and Associated Trainings',
        message: `Delete the role "${role}" and every training inside it? This cannot be undone.`,
        confirmLabel: 'Delete Role',
        onConfirm: () => {
          const updated = { ...roleTrainingTemplates };
          delete updated[role];
          saveTemplates(updated);
          render();
        }
      };
      render();
    };

    // Render root
    function render() {
      if (!templatesLoaded) {
        ensureTemplatesLoaded().then(render);
        document.body.innerHTML = `
          <div class="page-shell">
            <div class="card" style="margin-top:16px;">
              <div class="muted-box" style="min-height:120px;">Loading trainings...</div>
            </div>
          </div>
        `;
        return;
      }
      if (!state.sessionResolved) {
        ensureSessionResolved().then(render);
        document.body.innerHTML = `
          <div class="page-shell">
            <div class="card" style="margin-top:16px;">
              <div class="muted-box" style="min-height:120px;">Loading your SSO session...</div>
            </div>
          </div>
        `;
        return;
      }
      state.isAdmin = hasAdminAccess();
      if (state.view === 'unauthorized') return renderUnauthorized();
      if (state.view === 'register') return renderRegistration();
      if (state.view === 'admin-users') {
        if (hasAdminAccess()) return renderAdminUsers();
        state.view = 'dashboard';
      }
      if (state.view === 'admin-trainings') {
        if (hasTrainerAccess()) return renderAdminTrainings();
        state.view = 'dashboard';
      }
      if (state.view === 'admin-home') {
        state.view = 'dashboard';
      }
      if (state.view === 'dashboard') return renderDashboard();
      if (state.view === 'training') return renderTraining();
      return renderDashboard();
    }

    function renderUnauthorized() {
      const detail = state.sessionError
        ? `<div class="muted-box" style="min-height:auto; margin:0 0 14px; color:#8a1f1f; border-color:#f0c2c2; background:#fff1f1;">${escapeHtml(state.sessionError)}</div>`
        : '';
      document.body.innerHTML = `<div class="auth-wrap"><div class="auth-card"><div class="auth-header"><div class="icon-circle">${lockIcon()}</div><div class="auth-title">APAC AI Training Platform</div><div class="auth-sub">The Application Hub did not pass a usable SSO identity into training.</div></div>${detail}<div class="footer-text">Open the Training Platform from the Application Hub after Microsoft sign-in has completed.</div></div></div>`;
    }

    function renderRegistration() {
      const authName = state.authUser?.name || '';
      const authEmail = state.authUser?.email || '';
      const loadWarning = state.userLoadError
        ? `<div class="muted-box" style="min-height:auto; margin:0 0 14px; color:#8a5b00; border-color:#f4d9a6; background:#fff7e6;">${escapeHtml(state.userLoadError)}</div>`
        : '';
      const registrationMessage = state.registrationMessage
        ? `<div class="muted-box" style="min-height:auto; margin:0 0 14px; color:${state.registrationMessageType === 'success' ? '#155724' : '#8a1f1f'}; border-color:${state.registrationMessageType === 'success' ? '#b8e0c2' : '#f0c2c2'}; background:${state.registrationMessageType === 'success' ? '#edf9f0' : '#fff1f1'};">${escapeHtml(state.registrationMessage)}</div>`
        : '';
      document.body.innerHTML = `<div class="auth-wrap"><div class="auth-card"><div class="auth-header"><div class="icon-circle">${userAddIcon()}</div><div class="auth-title">Complete Training Registration</div><div class="auth-sub">Your Microsoft account is authenticated. Finish your training profile once, then you can select trainings from the home page.</div></div>${loadWarning}${registrationMessage}<form id="auth-form"><div class="form-grid"><div><label>Email</label><div class="field"><span class="icon-mini">${personIcon()}</span><input value="${authEmail}" disabled></div></div><div><label>Name</label><div class="field"><span class="icon-mini">${personIcon()}</span><input value="${escapeHtml(authName)}" disabled></div></div>${authField('Title','title','e.g., Systems Engineer','idcard') }<div><label>Manager Email Address</label><div class="field"><span class="icon-mini">${personIcon()}</span><input name="managerEmail" placeholder="manager@alterahealth.com" type="email"></div></div><div><label>Access Type</label><div class="field"><span class="icon-mini">${lockIcon()}</span><input value="Trainee" disabled></div></div></div><button class="primary" type="submit">Register & Open Dashboard</button></form></div></div>`;

    function authField(label, name, placeholder, icon, isSelect=false, type='text', value='') {

    function trainingSelectBlock() {

                <div>
                  <label>Name</label>

                </div>
