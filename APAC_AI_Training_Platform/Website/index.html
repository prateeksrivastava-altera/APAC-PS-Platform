    function initRoleSelector() {
      const roleSel = document.getElementById('role-select');
      const placeholder = document.getElementById('training-placeholder');
      const list = document.getElementById('training-options');
      const block = document.getElementById('training-block');
      roleSel.onchange = () => {
        const role = roleSel.value; list.innerHTML = '';
        if (!role) { placeholder.style.display = 'grid'; list.style.display = 'none'; block.classList.add('muted-box'); return; }
        const trainings = roleTrainingTemplates[role] || [];
        placeholder.style.display = 'none'; list.style.display = 'grid'; block.classList.remove('muted-box');
        list.innerHTML = trainings.map(t => `<div class="training-item" data-id="${t.id}" tabindex="0"><div><div style="font-weight:700;">${t.name}</div><div class="training-desc">${t.description || ''}</div><div class="training-desc">${t.phases.length} phases</div></div></div>`).join('');
        const items = Array.from(list.querySelectorAll('.training-item'));
        const selectOne = (target) => {
          items.forEach(el => el.classList.remove('selected'));
          target.classList.add('selected');
        };
        items.forEach(item => {
          item.onclick = () => selectOne(item);
          item.onkeydown = (e) => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectOne(item); } };
        });
      };
    }

    // Dashboard render
    function renderDashboard() {
      const user = state.currentUser;
      const managedUsers = getManagedUsers();
      const profileEditor = state.showProfileEditor ? renderProfileEditorModal(user) : '';
      if (!usersLoadResolved) {
        ensureUsersLoaded().then(() => {
          if (state.view === 'dashboard') render();
        });
      }
      document.body.innerHTML = `<div class="page-shell">${trainingPlatformNav('home')}<div style="margin-top:16px;" class="profile-card"><div class="profile-meta"><div class="label">Training Profile</div><div style="font-weight:700;">Name: ${user.name || 'N/A'}</div><div style="font-weight:700;">Email: ${user.email || 'N/A'}</div><div style="font-weight:700;">Title: ${user.title || 'N/A'}</div><div style="font-weight:700;">Manager Email: ${user.managerEmail || 'N/A'}</div><div style="font-weight:700;">Access: ${normalizeAccessType(user.accessType)}</div></div><div><div class="label" style="text-align:right;">Total Trainings</div><div class="big-count">${user.trainings.length}</div></div></div>${profileEditor}<div id="approvals-section"></div><div class="section-row"><div class="section-title">My Trainings</div><button class="add-btn" id="toggle-add">${plusIcon()} Add New Training</button></div>${state.showAddPanel ? addTrainingPanel() : ''}<div id="groups"></div><div class="section-row"><div class="section-title">My Team Trainings</div><div class="badge">${managedUsers.length} Report${managedUsers.length === 1 ? '' : 's'}</div></div><div id="managed-groups"></div></div>`;
      bindTrainingPlatformNav();
      if (el('cancel-profile-edit')) el('cancel-profile-edit').onclick = () => { state.showProfileEditor = false; render(); };
      if (el('close-profile-edit')) el('close-profile-edit').onclick = () => { state.showProfileEditor = false; render(); };
      if (el('profile-edit-modal-backdrop')) {
        el('profile-edit-modal-backdrop').onclick = (event) => {
          if (event.target === el('profile-edit-modal-backdrop')) {
            state.showProfileEditor = false;
            render();
          }
        };
      }
      if (el('profile-edit-form')) el('profile-edit-form').onsubmit = async (event) => { event.preventDefault(); await saveProfileEdit(event.target); };
      el('toggle-add').onclick = () => { state.showAddPanel = !state.showAddPanel; render(); };
      if (state.showAddPanel) initAddTraining();
      renderGroups();
      renderManagedGroups();
      renderApprovals();
    }

    function addTrainingPanel() {
      return `<div class="card add-row"><div style="font-weight:700; margin-bottom:10px;">Add New Training</div><div class="form-grid"><div><label>Select Role</label><div class="field select-role"><span class="icon-mini">${bagIcon()}</span><select id="add-role"><option value="">Select a role</option>${Object.keys(roleTrainingTemplates).map(r => `<option value="${r}">${r}</option>`).join('')}</select></div></div></div><div id="add-training-placeholder" class="muted-box" style="margin-top:12px;">${bagLargeIcon()}<div style="margin-top:6px;">Please select a role to view available trainings</div></div><div id="add-training-list" class="training-list" style="display:none; margin-top:12px;"></div><div style="display:flex; justify-content:flex-end;"><button class="primary" style="width:220px;" id="add-training-btn">Add Training</button></div></div>`;
    }

    function initAddTraining() {
      const roleSel = el('add-role'); const placeholder = el('add-training-placeholder'); const list = el('add-training-list'); const btn = el('add-training-btn');
      let selectedTrainingId = '';
      roleSel.onchange = () => {
        const role = roleSel.value; list.innerHTML = ''; selectedTrainingId = '';
        if (!role) { placeholder.style.display = 'grid'; list.style.display = 'none'; return; }
        const trainings = roleTrainingTemplates[role] || [];
        placeholder.style.display = 'none'; list.style.display = 'grid';
        list.innerHTML = trainings.map(t => `<label class="training-item" style="cursor:pointer;"><input type="radio" name="addTrainingChoice" value="${t.id}"><div><div style="font-weight:700;">${t.name}</div><div class="training-desc">${t.description || ''}</div><div class="training-desc">${t.phases.length} phases</div></div></label>`).join('');
        list.querySelectorAll('input').forEach(inp => inp.onchange = () => selectedTrainingId = inp.value);
      };
      btn.onclick = () => addTrainingToUser(roleSel.value, selectedTrainingId);
    }

    function renderGroups() {
      const container = el('groups'); const groups = groupByRole(state.currentUser.trainings);
      container.innerHTML = groups.map(g => `<div class="group-card" style="margin-top:14px;"><div class="group-header"><div style="display:flex; align-items:center; gap:8px; font-weight:700;">${bagIcon()} ${g.role}</div><div class="badge">${g.items.length} Training${g.items.length>1?'s':''}</div></div>${g.items.map(renderTrainingRow).join('')}</div>`).join('');
    }

    function renderManagedGroups() {
      const container = el('managed-groups');
      if (!container) return;
      if (!usersLoadResolved) {
        container.innerHTML = '<div class="muted-box">Loading direct-report training profiles...</div>';
        return;
      }
      const managedUsers = getManagedUsers();
      if (!managedUsers.length) {
        container.innerHTML = '<div class="muted-box">No direct reports found for your manager email.</div>';
        return;
      }
      container.innerHTML = `<div class="reports-grid">${managedUsers.map(renderManagedUserCard).join('')}</div>`;
    }

    function groupByRole(list) {
      const map = {};
      list.forEach(t => { map[t.role] = map[t.role] || []; map[t.role].push(t); });
      return Object.keys(map).map(role => ({ role, items: map[role] }));
    }

    function renderTrainingRow(t) {
      const s = statusLabel(t.status); const pct = progressPct(t);
      let actions = '';
      if (!t.started && t.status !== 'completed') {
        actions = `<button class="start-btn" onclick="startTrainingFlow('${t.id}','start')">Start</button>`;
      } else if (t.status === 'completed') {
        actions = `<button class="start-btn" onclick="startTrainingFlow('${t.id}','restart')">Restart</button>`;
      } else {
        actions = `
          <button class="start-btn" onclick="startTrainingFlow('${t.id}','resume')">Resume</button>
          <button class="light-btn" onclick="startTrainingFlow('${t.id}','restart')">Restart</button>
        `;
      }
      return `<div class="training-row" data-id="${t.id}"><div><div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;"><span>${bookIcon()}</span><div class="train-name">${t.name}</div></div><div class="progress-wrap"><span>Progress</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div><span>${t.currentPhaseIndex}/${t.phases.length}</span><span class="status-chip ${s.cls}">${statusDot()} ${s.text}</span></div></div><div style="display:flex; align-items:center; gap:10px;">${actions}</div></div>`;
    }

    function renderManagedUserCard(user) {
      const trainings = Array.isArray(user.trainings) ? user.trainings : [];
      const groups = groupByRole(trainings);
      return `
        <div class="report-card">
          <div class="report-head">
            <div>
              <div style="display:flex; align-items:center; gap:8px; font-weight:700;">${personIcon()} ${user.name || user.email}</div>
              <div class="report-meta">Email: ${user.email} | Title: ${user.title || 'N/A'}</div>
            </div>
            <div class="badge">${trainings.length} Training${trainings.length === 1 ? '' : 's'}</div>
          </div>
          ${groups.length ? groups.map(group => `
            <div class="report-training-group">
              <div class="group-header">
                <div style="display:flex; align-items:center; gap:8px; font-weight:700;">${bagIcon()} ${group.role}</div>
                <div class="badge">${group.items.length} Item${group.items.length === 1 ? '' : 's'}</div>
              </div>
              ${group.items.map(renderReadOnlyTrainingRow).join('')}
            </div>
          `).join('') : '<div class="muted-box" style="margin-top:14px; min-height:120px;">No trainings assigned.</div>'}
        </div>
      `;
    }

    function renderReadOnlyTrainingRow(t) {
      const s = statusLabel(t.status);
      const pct = progressPct(t);
      const phaseCount = Array.isArray(t.phases) ? t.phases.length : 0;
      const currentPhase = phaseCount ? Math.min((Number.isFinite(t.currentPhaseIndex) ? t.currentPhaseIndex : 0) + 1, phaseCount) : 0;
      return `<div class="training-row"><div><div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;"><span>${bookIcon()}</span><div class="train-name">${t.name}</div></div><div class="training-desc">${t.description || 'Training assigned to this user.'}</div><div class="progress-wrap" style="margin-top:8px;"><span>Progress</span><div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div><span>${currentPhase}/${phaseCount}</span><span class="status-chip ${s.cls}">${statusDot()} ${s.text}</span></div></div><div style="color:#564f79; font-size:13px; font-weight:600;">Read only</div></div>`;
    }

    window.startTrainingFlow = (id, mode) => {
      const user = state.currentUser;
      const t = user.trainings.find(x => x.id === id);
      if (!t) return;
      ensureTrainingState(t);
      syncTrainingMetadata(t);
        if (mode === 'restart') {
          resetEntireTraining(t, '');
      } else if (mode === 'resume') {
        t.systemNotice = '';
        t.started = true;
        t.status = t.status === 'completed' ? 'completed' : 'in-progress';
      }
      state.selectedTraining = t;
      state.view = 'training';
      state.showMentor = false;
      render();
    };

    // Training view render
    function renderTraining() {
      const t = ensureTrainingState(state.selectedTraining);
      syncTrainingMetadata(t);
      ensureCurrentItem(t);
      const phaseNum = Math.min(t.currentPhaseIndex + 1, t.phases.length);
      const total = t.phases.length || 1;
      const percent = progressPct(t);
      const currentPhase = t.phases[t.currentPhaseIndex] || { name: 'Phase 1', items: [] };
      const currentItem = (currentPhase.items || [])[t.currentItemIndex] || null;
      const entryKey = `${t.currentPhaseIndex}:${t.currentItemIndex}`;
      if (currentItem && currentItem.type === 'assessment' && t.lastAssessmentEntryKey !== entryKey) {
        const stateObj = currentItem.assessmentState || {};
        const hasScore = stateObj.completed || stateObj.passed || stateObj.scorePct > 0;
        if (hasScore) {
          currentItem.assessmentState = { index: 0, answers: [], completed: false, passed: false, scoreMarks: 0, totalMarks: 0, scorePct: 0, startedAt: 0, endsAt: 0, remainingSeconds: 0, timedOut: false, retryCount: 0 };
        } else {
          const answersList = Array.isArray(stateObj.answers) ? stateObj.answers : [];
          const hasAnyAnswer = answersList.some(a => (Array.isArray(a) ? a.length > 0 : a !== undefined && a !== null));
          if (!hasAnyAnswer && stateObj.index > 0) {
            stateObj.index = 0;
          }
        }
        t.lastAssessmentEntryKey = entryKey;
      } else if (t.lastAssessmentEntryKey !== entryKey) {
        t.lastAssessmentEntryKey = entryKey;
      }
      const overviewHtml = renderTrainingOverview(t);
      const forceMentor = t.started && currentItem && currentItem.type === 'ai-chat';
      const showMentor = forceMentor || state.showMentor;
      const itemHtml = t.started ? renderCurrentItem(t, currentPhase, currentItem) : '';
      if (currentItem && currentItem.type === 'ai-chat' && t.lastAutoMentorItemId !== currentItem.id) {
        t.lastAutoMentorItemId = currentItem.id;
        autoStartMentorSession(currentItem, true);
      }
      document.body.innerHTML = `
        <div class="page-shell">
          <div class="nav">
            <div class="nav-left">
              <div class="home-icon">${homeIcon()}</div>
              <div>
                <div class="nav-title">${t.name}</div>
              </div>
            </div>
            <div class="nav-actions">
              <button class="link-btn" id="back-dash">${homeSmallIcon()} Dashboard</button>
            </div>
          </div>
          <div class="card training-layout">
            ${t.systemNotice ? `<div class="muted-box" style="min-height:auto; margin-bottom:12px; place-items:start; text-align:left; color:#8a1f1f; border-color:#f0c2c2; background:#fff1f1;">${escapeHtml(t.systemNotice)}</div>` : ''}
            <div class="training-top">
              <div class="home-icon" style="width:42px; height:42px;">${bookIcon()}</div>
              <div>
                <div style="font-size:14px; color:var(--muted);">Overall Progress</div>
                <div class="progress-bar" style="width:240px; margin-top:4px;"><div class="progress-fill" style="width:${percent}%;"></div></div>
                <div style="font-size:12px; color:#4b556b; margin-top:4px;">${t.currentPhaseIndex}/${total} phases</div>
              </div>
            </div>
            <div class="phase-tabs">${t.phases.map((p,i)=>`<div class="phase-tab ${i===t.currentPhaseIndex ? 'current' : i < t.currentPhaseIndex ? 'done phase-tab--clickable' : ''}" data-phase-index="${i}"><span>${i+1}. ${getPhaseName(p)}</span></div>`).join('')}</div>
            ${!t.started ? `
              <div class="card" style="margin-top:12px;">
                <div style="font-weight:800; margin-bottom:6px; font-size:18px; letter-spacing:-0.02em; color:var(--blue-dark);">How this training will progress</div>
                ${overviewHtml}
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px; gap:10px;">
                  ${t.mentorMissionId ? `<button class="link-btn" id="mentor-btn">${chatIcon()} Get My Mentor</button>` : '<span></span>'}
                  <button class="primary" style="width:220px;" id="start-training-btn">Start Training</button>
                </div>
              </div>
            ` : itemHtml}
            ${showMentor ? `
              <div class="chat-shell" style="margin-top:12px;">
                <div class="chat-box" id="chat-box"></div>
                <div class="chat-input">
                  <input id="chat-input" placeholder="${state.mentorPending ? 'Matcha is preparing a response...' : 'Type your message or answer here...'}" autocomplete="off" ${state.mentorPending ? 'disabled' : ''}>
                  <button id="send-btn" ${state.mentorPending ? 'disabled' : ''}>Send</button>
                </div>
              </div>
            ` : ''}
          </div>
        </div>
      `;
      el('back-dash').onclick = () => { state.view = 'dashboard'; state.selectedTraining = null; state.showMentor = false; state.mentorReason = ''; render(); };
        const mentorBtn = el('mentor-btn');
        if (mentorBtn) mentorBtn.onclick = () => {
          const item = currentItem || getCurrentTrainingItem() || {};
          state.mentorReason = item.type === 'doc' && item.fileName
            ? `User requested mentor support for the document "${item.fileName}".`
            : `User requested mentor support during ${activityLabel(item.type || 'activity')}.`;
          if (state.selectedTraining) state.selectedTraining.chatHistory = [];
          state.showMentor = true;
          const kickoffText = item.type === 'doc' && item.fileName
            ? `Please read the selected document "${item.fileName}" and help me understand it for "${getPhaseName(currentPhase) || t.name || 'this phase'}". Use only that document.`
            : `Do you need help with ${activityLabel(item.type || 'this activity')}?`;
          sendMentorMessage('', item, { autoKickoff: true, kickoffText, useHistory: false });
          render();
        };
      const startBtn = el('start-training-btn');
      if (startBtn) startBtn.onclick = () => startTraining(t);
        document.querySelectorAll('.phase-tab--clickable').forEach(tab => {
          tab.onclick = () => {
            const targetPhaseIndex = Number(tab.dataset.phaseIndex);
            if (!Number.isInteger(targetPhaseIndex)) return;
            const targetPhase = t.phases?.[targetPhaseIndex];
            const ok = confirm(`Return to "${getPhaseName(targetPhase)}"? All progress for this phase and every phase after it will be lost.`);
            if (!ok) return;
            resetTrainingProgressFromPhase(t, targetPhaseIndex);
            persistUser(state.currentUser);
            render();
          };
        });
        const completeBtn = el('complete-item-btn');
        if (completeBtn) completeBtn.onclick = () => handleCompleteItem(t, currentPhase, currentItem);
        setupAssessmentTimer(t, currentItem);
        if (showMentor) {
          renderChat();
          el('send-btn').onclick = () => {
            if (state.mentorPending) return;
            const val = el('chat-input').value;
            sendMessage(val);
            el('chat-input').value='';
          };
          el('chat-input').addEventListener('keyup', (e)=>{ if(e.key==='Enter' && !state.mentorPending){ e.preventDefault(); el('send-btn').click(); }});
          autoStartMentorSession(currentItem);
        }
      }

    function renderTrainingOverview(t) {
      const phases = t.phases || [];
      const phaseCards = phases.map((phase, idx) => {
        const items = (phase.items || []).map(item => {
          if (item.type === 'doc' && (item.fileName || item.url)) return `<li class="training-overview-activity"><span class="training-overview-activity-label">Document</span><span class="training-overview-activity-text">${item.fileName || 'Linked document'}</span></li>`;
          if (item.type === 'video' && (item.fileName || item.url)) return `<li class="training-overview-activity"><span class="training-overview-activity-label">Video</span><span class="training-overview-activity-text">${item.fileName || 'Linked video'}</span></li>`;
          if (item.type === 'lms' && item.lmsLink) return '<li class="training-overview-activity"><span class="training-overview-activity-label">LMS</span><span class="training-overview-activity-text">Workday or linked course module</span></li>';
          if (item.type === 'handson') return '<li class="training-overview-activity"><span class="training-overview-activity-label">Hands-on</span><span class="training-overview-activity-text">Applied practice activity</span></li>';
          if (item.type === 'assessment') return '<li class="training-overview-activity"><span class="training-overview-activity-label">Assessment</span><span class="training-overview-activity-text">Knowledge validation</span></li>';
          if (item.type === 'text') return '<li class="training-overview-activity"><span class="training-overview-activity-label">Read-through</span><span class="training-overview-activity-text">Guided text content</span></li>';
          if (item.type === 'ai-chat') return `<li class="training-overview-activity"><span class="training-overview-activity-label">Mentor</span><span class="training-overview-activity-text">${item.mentorTopic || 'Interactive mentor session'}</span></li>`;
          return `<li class="training-overview-activity"><span class="training-overview-activity-label">${activityLabel(item.type)}</span><span class="training-overview-activity-text">Included in this phase</span></li>`;
        }).join('') || '<li class="training-overview-activity"><span class="training-overview-activity-label">Info</span><span class="training-overview-activity-text">No activities configured yet.</span></li>';
        const itemCount = (phase.items || []).length;
        return `
          <article class="training-overview-phase">
            <div class="training-overview-phase-top">
              <div>
                <div class="training-overview-phase-label">Phase ${idx + 1}</div>
                <div class="training-overview-phase-name">${getPhaseName(phase)}</div>
              </div>
              <div class="training-overview-phase-count">${itemCount} ${itemCount === 1 ? 'activity' : 'activities'}</div>
            </div>
            <ul class="training-overview-phase-list">${items}</ul>
          </article>
        `;
      }).join('');
      return `
        <div class="training-overview">
          <div class="training-overview-hero">
            <div class="training-overview-kicker">Learning journey</div>
            <div class="training-overview-title">${t.name}</div>
            <div class="training-overview-text">
              The training path is split into ${phases.length} focused phases. Each phase combines guided reading,
              mentor interaction, hands-on practice, or assessment so the progression feels deliberate rather than linear.
            </div>
          </div>
          <div class="training-overview-grid">${phaseCards}</div>
        </div>
      `;
    }

    function renderCurrentItem(training, phase, item) {
      if (!item) {
        return `<div class="card" style="margin-top:12px;"><div class="muted-box">No items found for this phase.</div></div>`;
      }
      const approvalReq = getApprovalRequest(state.currentUser, training.id, item.id);
      const pending = approvalReq && approvalReq.status === 'pending';
      const approved = approvalReq && approvalReq.status === 'approved';
      const rejected = approvalReq && approvalReq.status === 'rejected';
      const requires = requiresApproval(item);
      const details = renderItemDetails(training, phase, item);
      const buttonLabel = requires && approved ? 'Continue' : getCompleteLabel(item);
      const disableComplete = requires && !!pending;
      const allowMentor = item.type !== 'ai-chat' && item.type !== 'assessment' && !!training.mentorMissionId;
      const showCompleteButton = item.type !== 'assessment';
      const approvalNote = requires ? `<div class="training-desc" style="margin-top:6px;">Manager approval required to proceed.</div>` : '';
      const pendingNote = pending ? `<div class="training-desc" style="margin-top:6px; color:#c62828;">Awaiting manager approval.</div>` : '';
      const approvedNote = approved ? `<div class="training-desc" style="margin-top:6px; color:#1c8c4a;">Congratulations, your manager has approved.</div>` : '';
      const rejectedNote = rejected ? `<div class="training-desc" style="margin-top:6px; color:#c62828;">Sorry, your manager has rejected the outcome, please try again.</div>` : '';
      const header = item.type === 'ai-chat'
        ? `<div style="display:flex; align-items:center; gap:12px; margin-top:4px;">
             <span style="display:inline-flex; align-items:center; justify-content:center; width:42px; height:42px; border-radius:14px; background:#f8eef6; color:#7b215f;">${activityIcon(item.type).replace('width:14px; height:14px;', 'width:24px; height:24px;')}</span>
             <div style="font-size:22px; font-weight:800; letter-spacing:-0.02em; color:#211852;">${activityLabel(item.type)}</div>
           </div>`
        : `<div class="training-desc" style="margin-top:4px;">Current activity: ${activityIcon(item.type)} ${activityLabel(item.type)}</div>`;
      const actionsRow = (allowMentor || showCompleteButton) ? `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-top:12px; gap:10px;">
            ${allowMentor ? `<button class="link-btn" id="mentor-btn">${chatIcon()} Get My Mentor</button>` : '<span></span>'}
            ${showCompleteButton ? `<button class="primary ${disableComplete ? 'is-disabled' : ''}" style="width:320px;" id="complete-item-btn" ${disableComplete ? 'disabled aria-disabled="true"' : ''}>${buttonLabel}</button>` : '<span></span>'}
          </div>
      ` : '';
      return `
        <div class="card" style="margin-top:12px;">
          ${header}
          ${details}
          ${approvalNote}
          ${pendingNote}
          ${approvedNote}
          ${rejectedNote}
          ${actionsRow}
        </div>
      `;
    }

    function renderItemDetails(training, phase, item) {
      if (item.type === 'doc') {
        const link = item.fileName ? resourceUrl(item.type, item.fileName) : item.url;
        const topic = getPhaseName(phase) || item.mentorTopic || training.name || 'this topic';
        return link
          ? `<div class="training-desc" style="margin-top:8px;"><strong>Read the following document</strong> to understand <strong>${topic}</strong>.</div><div class="training-desc" style="margin-top:8px;"><a href="${link}" target="_blank" rel="noreferrer">${item.fileName || item.url}</a></div>`
          : '<div class="training-desc" style="margin-top:8px;">No document linked yet.</div>';
      }
      if (item.type === 'video') {
        const link = item.fileName ? resourceUrl(item.type, item.fileName) : item.url;
        return link ? `<div class="training-desc" style="margin-top:8px;">Video: <a href="${link}" target="_blank" rel="noreferrer">${item.fileName || item.url}</a></div>` : '<div class="training-desc" style="margin-top:8px;">No video linked yet.</div>';
      }
      if (item.type === 'lms') {
        return item.lmsLink ? `<div class="training-desc" style="margin-top:8px;">Course link: <a href="${item.lmsLink}" target="_blank" rel="noreferrer">${item.lmsLink}</a></div>` : '<div class="training-desc" style="margin-top:8px;">No course link provided.</div>';
      }
      if (item.type === 'handson') {
        return `<div class="training-desc" style="margin-top:8px;">${item.handsonText || 'No hands-on instructions provided yet.'}</div>`;
      }
      if (item.type === 'text') {
        return `<div class="training-desc" style="margin-top:8px;">${item.textContent || 'No formatted text provided yet.'}</div>`;
      }
      if (item.type === 'assessment') {
        return renderAssessment(training, item);
      }
      if (item.type === 'ai-chat') {
        return `<div class="training-desc" style="margin-top:12px; font-size:15px; line-height:1.7; color:#4f4873;">Use this mentor session to discuss the selected section with a trained AI guide. Review the guidance, ask follow-up questions as needed, and press <strong>I am ready for next section</strong> once you have what you need to continue.</div>`;
      }
      return '';
    }

    function normalizePassingMarks(value) {
      const num = Number.parseFloat(value);
      return Number.isFinite(num) ? num : 0;
    }

    function isMultiSelectQuestion(question) {
      if (!question) return false;
      if (question.multi) return true;
      if (question.type === 'multi') return true;
      const correctCount = (question.options || []).filter(opt => opt && opt.correct).length;
      return correctCount > 1;
    }

    function formatTime(seconds) {
      const clamped = Math.max(0, Math.floor(seconds || 0));
      const mins = Math.floor(clamped / 60);
      const secs = clamped % 60;
      return `${mins}:${String(secs).padStart(2, '0')}`;
    }

    function getAssessmentState(item) {
      if (!item.assessmentState || typeof item.assessmentState !== 'object') {
        item.assessmentState = {
          index: 0,
          answers: [],
          completed: false,
          passed: false,
          scoreMarks: 0,
          totalMarks: 0,
          scorePct: 0,
          startedAt: 0,
          endsAt: 0,
          remainingSeconds: 0,
          timedOut: false,
          retryCount: 0
        };
      }
      return item.assessmentState;
    }

    function getItemById(training, itemId) {
      const phases = training.phases || [];
      for (const phase of phases) {
        const found = (phase.items || []).find(i => i.id === itemId);
        if (found) return found;
      }
      return null;
    }

    function renderAssessment(training, item) {
      const assessment = item.assessment || {};
      const questions = Array.isArray(assessment.questions) ? assessment.questions : [];
      if (!questions.length) {
        return '<div class="training-desc" style="margin-top:8px;">No questions added yet.</div>';
      }
      const state = getAssessmentState(item);
      const durationMinutes = Number(assessment.durationMinutes || 0);
      if (!state.startedAt && !state.completed) {
        state.index = 0;
        state.answers = [];
        state.startedAt = Date.now();
        if (durationMinutes > 0) {
          state.endsAt = state.startedAt + (durationMinutes * 60000);
        } else {
          state.endsAt = 0;
        }
      }
      if (!state.completed) {
        if (state.index >= questions.length) state.index = 0;
        const answersList = Array.isArray(state.answers) ? state.answers : [];
        const hasAnyAnswer = answersList.some(a => (Array.isArray(a) ? a.length > 0 : a !== undefined && a !== null));
        if (!hasAnyAnswer) state.index = 0;
      }
      const total = questions.length;
      const idx = Math.min(Math.max(state.index, 0), total - 1);
      const q = questions[idx] || {};
      const isMulti = isMultiSelectQuestion(q);
      const selected = state.answers[idx] ?? (isMulti ? [] : null);
      const passing = normalizePassingMarks(assessment.passingMarks || 0);
      const maxRetries = parseAssessmentMaxRetries(assessment.maxRetries);
      const retriesUsed = Math.max(0, Number.parseInt(state.retryCount || 0, 10) || 0);
      const retriesRemaining = maxRetries === null ? null : Math.max(0, maxRetries - retriesUsed);
      const timeRemaining = durationMinutes
        ? (() => {
            const endsAt = state.endsAt || (state.startedAt ? state.startedAt + (durationMinutes * 60000) : 0);
            const remaining = endsAt ? Math.max(0, Math.ceil((endsAt - Date.now()) / 1000)) : Math.round(durationMinutes * 60);
            state.remainingSeconds = remaining;
            return `<div class="training-desc" id="assessment-timer-${item.id}" style="margin-top:6px;">Time remaining: ${formatTime(remaining)}</div>`;
          })()
        : '';
      const earnedMarks = normalizeMarkValue(state.scoreMarks || 0);
      const totalMarks = normalizeMarkValue(state.totalMarks || questions.reduce((sum, question) => sum + getQuestionAvailableMarks(question), 0));
      const resultNote = state.completed
        ? (state.passed
          ? `<div class="assessment-result pass">Passed (${earnedMarks}/${totalMarks} marks, pass mark ${passing})</div>`
          : `<div class="assessment-result fail">${state.timedOut ? 'Time expired. ' : ''}Failed (${earnedMarks}/${totalMarks} marks, pass mark ${passing}).${retriesRemaining === null ? ' Unlimited retries available.' : (retriesRemaining > 0 ? ` ${retriesRemaining} retr${retriesRemaining === 1 ? 'y' : 'ies'} remaining.` : ' No retries remaining.')}</div>`)
        : '';
      const retryBtn = state.completed && !state.passed && (retriesRemaining === null || retriesRemaining > 0)
        ? `<button class="light-btn" onclick="retryAssessment('${training.id}','${item.id}')">Retry assessment</button>`
        : '';
      const canNext = isMulti ? Array.isArray(selected) && selected.length > 0 : selected !== undefined && selected !== null;
      const isLast = idx === total - 1;
      const actionBtn = state.completed
        ? ''
        : isLast
          ? `<button class="primary" style="width:200px;" ${canNext ? '' : 'disabled'} onclick="submitAssessment('${training.id}','${item.id}')">End Test</button>`
          : `<button class="primary" style="width:200px;" ${canNext ? '' : 'disabled'} onclick="nextAssessmentQuestion('${training.id}','${item.id}')">Next</button>`;
      return `
        <div class="training-desc" style="margin-top:8px;"><strong>Question ${idx + 1} of ${total}</strong></div>
        <div class="training-desc" style="margin-top:6px;"><strong>Q${idx + 1}.</strong> ${q.text || 'Untitled question'}</div>
        ${isMulti ? '<div class="training-desc" style="margin-top:4px;">Select all that apply.</div>' : ''}
        <div style="display:grid; gap:8px; margin-top:8px;">
          ${(q.options || []).map((opt, optIdx) => `
            <button class="assess-option ${isMulti ? (Array.isArray(selected) && selected.includes(optIdx) ? 'selected' : '') : (selected === optIdx ? 'selected' : '')}" onclick="selectAssessmentOption('${training.id}','${item.id}',${optIdx})">${opt.text || 'Option'}</button>
          `).join('')}
        </div>
        ${timeRemaining}
        <div class="training-desc" style="margin-top:6px;">Allowed retries: ${maxRetries === null ? 'Unlimited' : maxRetries} | Retries used: ${retriesUsed}</div>
        ${resultNote}
        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:12px;">
          ${retryBtn}
          ${actionBtn}
        </div>
        ${state.completed && state.passed ? `<div style="display:flex; justify-content:flex-end; margin-top:10px;"><button class="primary" style="width:220px;" onclick="completeAssessment('${training.id}','${item.id}')">Continue to next section</button></div>` : ''}
      `;
    }

    function getNextItemSummary(training) {
      const phases = training.phases || [];
      let phaseIdx = training.currentPhaseIndex;
      let itemIdx = training.currentItemIndex + 1;
      while (phaseIdx < phases.length) {
        const items = phases[phaseIdx]?.items || [];
        if (itemIdx < items.length) {
          const nextItem = items[itemIdx];
          return `Phase ${phaseIdx + 1} • ${activityLabel(nextItem.type)}`;
        }
        phaseIdx += 1;
        itemIdx = 0;
      }
      return '';
    }

    function getCompleteLabel(item) {
      if (item.type === 'doc') return 'I have completed reading the document';
      if (item.type === 'video') return 'I have completed watching the video';
      if (item.type === 'lms') return 'I have completed the LMS/Workday course';
      if (item.type === 'handson') return 'I have completed the hands-on activity';
      if (item.type === 'assessment') return 'I have completed the assessment';
      if (item.type === 'ai-chat') return 'I am ready for next section';
      return 'I have completed this activity';
    }

    function resetEntireTraining(training, noticeText) {
      training.currentPhaseIndex = 0;
      training.currentItemIndex = 0;
      training.started = false;
      training.status = 'not-started';
      training.completedItemIds = [];
      training.lastAutoMentorItemId = '';
      training.lastAssessmentEntryKey = '';
      training.systemNotice = noticeText || '';
      (training.phases || []).forEach(phase => {
        (phase.items || []).forEach(item => {
          if (item && item.type === 'assessment') {
            item.assessmentState = { index: 0, answers: [], completed: false, passed: false, scoreMarks: 0, totalMarks: 0, scorePct: 0, startedAt: 0, endsAt: 0, remainingSeconds: 0, timedOut: false, retryCount: 0 };
          }
          if (item && item.type === 'ai-chat') {
            item.autoMentorStarted = false;
          }
        });
      });
      if (Array.isArray(state.currentUser?.approvals)) {
        state.currentUser.approvals = state.currentUser.approvals.filter(req => req.trainingId !== training.id);
      }
      training.chatHistory = [{ from: 'bot', text: `Welcome to ${training.name}! We'll be going through ${training.phases.length} phases together. Currently, you're in Phase 1: ${getPhaseName(training.phases[0])}. Let me know when you're ready to begin, or ask me any questions! Also, share a quick intro about yourself so I can tailor the journey.`, time: new Date().toLocaleTimeString() }];
      state.showMentor = false;
      state.mentorReason = '';
      state.mentorPending = false;
    }

    function startTraining(training) {
      training.systemNotice = '';
      training.started = true;
      training.currentPhaseIndex = 0;
      training.currentItemIndex = 0;
      training.status = 'in-progress';
      ensureCurrentItem(training);
      preloadTrainingDocs(training);
      persistUser(state.currentUser);
      render();
    }

    async function preloadTrainingDocs(training) {
      const folderId = training.mentorFolderId;
      if (!folderId) return;
      const files = [];
      (training.phases || []).forEach(phase => {
        (phase.items || []).forEach(item => {
          if (item.type === 'doc' && item.fileName) files.push(item.fileName);
        });
      });
      const uniqueFiles = Array.from(new Set(files));
      if (!uniqueFiles.length) return;
      try {
        await fetch(`${BASE_PATH}/api/matcha/preload-docs`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folderId, files: uniqueFiles })
        });
      } catch {
        // ignore preload errors, user can still proceed
      }
    }

    function handleCompleteItem(training, phase, item) {
      if (!item) return;
      if (requiresApproval(item)) {
        const approvalReq = getApprovalRequest(state.currentUser, training.id, item.id);
        if (approvalReq && approvalReq.status === 'approved') {
          completeItemAndAdvance(training, item);
          training.status = training.currentPhaseIndex >= training.phases.length ? 'completed' : 'in-progress';
          if (item.type !== 'ai-chat') state.showMentor = false;
          if (training.chatHistory) training.chatHistory = [];
          persistUser(state.currentUser);
          render();
          return;
        }
        if (!state.currentUser.managerEmail) {
          return alert('Manager approval required. Please add a manager email address in your profile.');
        }
        requestApproval(state.currentUser, training, training.currentPhaseIndex, training.currentItemIndex, item);
        persistUser(state.currentUser);
        render();
        return;
      }
      completeItemAndAdvance(training, item);
      training.status = training.currentPhaseIndex >= training.phases.length ? 'completed' : 'in-progress';
      if (item.type !== 'ai-chat') state.showMentor = false;
      if (training.chatHistory) training.chatHistory = [];
      persistUser(state.currentUser);
      render();
    }

      window.selectAssessmentOption = (trainingId, itemId, optionIndex) => {
        const training = state.selectedTraining;
        if (!training || training.id !== trainingId) return;
        const item = getItemById(training, itemId);
        if (!item) return;
        const stateObj = getAssessmentState(item);
        if (stateObj.completed) return;
        const questions = Array.isArray(item.assessment?.questions) ? item.assessment.questions : [];
        const question = questions[stateObj.index];
        const isMulti = isMultiSelectQuestion(question);
        if (isMulti) {
          const current = Array.isArray(stateObj.answers[stateObj.index]) ? [...stateObj.answers[stateObj.index]] : [];
          const idx = current.indexOf(optionIndex);
          if (idx >= 0) current.splice(idx, 1);
          else current.push(optionIndex);
          stateObj.answers[stateObj.index] = current;
        } else {
          stateObj.answers[stateObj.index] = optionIndex;
        }
        persistUser(state.currentUser);
        render();
      };

      window.nextAssessmentQuestion = (trainingId, itemId) => {
        const training = state.selectedTraining;
        if (!training || training.id !== trainingId) return;
        const item = getItemById(training, itemId);
        if (!item) return;
        const stateObj = getAssessmentState(item);
        const questions = Array.isArray(item.assessment?.questions) ? item.assessment.questions : [];
        const question = questions[stateObj.index];
        const isMulti = isMultiSelectQuestion(question);
        const currentAnswer = stateObj.answers[stateObj.index];
        if (isMulti ? !(Array.isArray(currentAnswer) && currentAnswer.length) : currentAnswer === undefined) return;
        stateObj.index = Math.min(stateObj.index + 1, (item.assessment?.questions || []).length - 1);
        persistUser(state.currentUser);
        render();
      };

      function isAnswerCorrect(question, chosen) {
        const options = question?.options || [];
        const correctIndices = options.map((opt, idx) => (opt && opt.correct ? idx : -1)).filter(idx => idx >= 0);
        if (!correctIndices.length) return false;
        const isMulti = isMultiSelectQuestion(question);
        if (isMulti) {
          const chosenArr = Array.isArray(chosen) ? chosen : (chosen === undefined || chosen === null ? [] : [chosen]);
          if (chosenArr.length !== correctIndices.length) return false;
          const chosenSet = new Set(chosenArr);
          return correctIndices.every(idx => chosenSet.has(idx));
        }
        return chosen === correctIndices[0];
      }

      function scoreQuestion(question, chosen) {
        if (question?.markingMode === 'individual') {
          const chosenArr = Array.isArray(chosen) ? chosen : (chosen === undefined || chosen === null ? [] : [chosen]);
          const chosenSet = new Set(chosenArr);
          return (question?.options || []).reduce((sum, opt, idx) => {
            if (!opt || !opt.correct || !chosenSet.has(idx)) return sum;
            return sum + normalizeMarkValue(opt.markValue);
          }, 0);
        }
        return isAnswerCorrect(question, chosen) ? normalizeMarkValue(question?.combinedMarks) : 0;
      }

      function finalizeAssessment(training, item, opts = {}) {
        const questions = Array.isArray(item.assessment?.questions) ? item.assessment.questions : [];
        if (!questions.length) return;
        const stateObj = getAssessmentState(item);
        const passing = normalizePassingMarks(item.assessment?.passingMarks || 0);
        const maxRetries = parseAssessmentMaxRetries(item.assessment?.maxRetries);
        const totalMarks = questions.reduce((sum, q) => sum + getQuestionAvailableMarks(q), 0);
        let earnedMarks = 0;
        questions.forEach((q, qIdx) => {
          const chosen = stateObj.answers[qIdx];
          earnedMarks += scoreQuestion(q, chosen);
        });
        const scorePct = totalMarks > 0 ? Math.round((earnedMarks / totalMarks) * 100) : 0;
        stateObj.completed = true;
        stateObj.passed = earnedMarks >= passing;
        stateObj.scoreMarks = earnedMarks;
        stateObj.totalMarks = totalMarks;
        stateObj.scorePct = scorePct;
        if (opts.timedOut) stateObj.timedOut = true;
        const timerKey = `${training.id}::${item.id}`;
        const timerId = assessmentTimers.get(timerKey);
        if (timerId) clearInterval(timerId);
        assessmentTimers.delete(timerKey);
        if (!stateObj.passed && maxRetries !== null && stateObj.retryCount >= maxRetries) {
          resetEntireTraining(training, `Assessment retry limit reached for ${activityLabel(item.type)}. The training has been restarted from the beginning.`);
        }
        persistUser(state.currentUser);
        render();
      }

      window.submitAssessment = (trainingId, itemId) => {
        const training = state.selectedTraining;
        if (!training || training.id !== trainingId) return;
        const item = getItemById(training, itemId);
        if (!item) return;
        const stateObj = getAssessmentState(item);
        const questions = Array.isArray(item.assessment?.questions) ? item.assessment.questions : [];
        const question = questions[stateObj.index];
        const isMulti = isMultiSelectQuestion(question);
        const currentAnswer = stateObj.answers[stateObj.index];
        if (isMulti ? !(Array.isArray(currentAnswer) && currentAnswer.length) : currentAnswer === undefined) return;
        finalizeAssessment(training, item);
      };

      window.completeAssessment = (trainingId, itemId) => {
        const training = state.selectedTraining;
        if (!training || training.id !== trainingId) return;
        const item = getItemById(training, itemId);
        if (!item) return;
        const stateObj = getAssessmentState(item);
        if (!stateObj.completed || !stateObj.passed) return;
        completeItemAndAdvance(training, item);
        training.status = training.currentPhaseIndex >= training.phases.length ? 'completed' : 'in-progress';
        persistUser(state.currentUser);
        render();
      };

      window.retryAssessment = (trainingId, itemId) => {
        const training = state.selectedTraining;
        if (!training || training.id !== trainingId) return;
        const item = getItemById(training, itemId);
        if (!item) return;
        const previousState = getAssessmentState(item);
        const timerKey = `${training.id}::${item.id}`;
        const timerId = assessmentTimers.get(timerKey);
        if (timerId) clearInterval(timerId);
        assessmentTimers.delete(timerKey);
        item.assessmentState = { index: 0, answers: [], completed: false, passed: false, scoreMarks: 0, totalMarks: 0, scorePct: 0, startedAt: 0, endsAt: 0, remainingSeconds: 0, timedOut: false, retryCount: (previousState.retryCount || 0) + 1 };
        persistUser(state.currentUser);
        render();
      };

      function setupAssessmentTimer(training, item) {
        const key = item && item.type === 'assessment' ? `${training.id}::${item.id}` : '';
        if (activeAssessmentKey && activeAssessmentKey !== key) {
          const oldTimer = assessmentTimers.get(activeAssessmentKey);
          if (oldTimer) clearInterval(oldTimer);
          assessmentTimers.delete(activeAssessmentKey);
        }
        activeAssessmentKey = key;
        if (!item || item.type !== 'assessment') return;
        const durationMinutes = Number(item.assessment?.durationMinutes || 0);
        if (!durationMinutes || durationMinutes <= 0) return;
        const stateObj = getAssessmentState(item);
        if (stateObj.completed) return;
        if (!stateObj.startedAt) {
          stateObj.startedAt = Date.now();
          stateObj.endsAt = stateObj.startedAt + (durationMinutes * 60000);
        }
        if (!stateObj.endsAt) stateObj.endsAt = stateObj.startedAt + (durationMinutes * 60000);
        const tick = () => {
          const remaining = Math.max(0, Math.ceil((stateObj.endsAt - Date.now()) / 1000));
          stateObj.remainingSeconds = remaining;
          const timerEl = document.getElementById(`assessment-timer-${item.id}`);
          if (timerEl) timerEl.textContent = `Time remaining: ${formatTime(remaining)}`;
          if (remaining <= 0) {
            const timerId = assessmentTimers.get(key);
            if (timerId) clearInterval(timerId);
            assessmentTimers.delete(key);
            if (!stateObj.completed) finalizeAssessment(training, item, { timedOut: true });
          }
        };
        tick();
        if (!assessmentTimers.get(key)) {
          assessmentTimers.set(key, setInterval(tick, 1000));
        }
      }

    function sanitizeHtml(raw) {
      const allowedTags = new Set(['b','strong','em','i','u','br','p','ul','ol','li','h1','h2','h3','h4','pre','code','span','div','hr']);
      const template = document.createElement('template');
      template.innerHTML = String(raw || '');
      const walker = document.createTreeWalker(template.content, NodeFilter.SHOW_ELEMENT, null);
      const nodes = [];
      while (walker.nextNode()) nodes.push(walker.currentNode);
      nodes.forEach(node => {
        const tag = node.tagName.toLowerCase();
        if (!allowedTags.has(tag)) {
          const text = document.createTextNode(node.textContent || '');
          node.replaceWith(text);
          return;
        }
        [...node.attributes].forEach(attr => {
          const name = attr.name.toLowerCase();
          if (name.startsWith('on') || name === 'style' || name === 'href' || name === 'src') {
            node.removeAttribute(attr.name);
          }
        });
      });
      return template.innerHTML;
    }

    function formatMessage(text) {
      const raw = String(text || '');
      if (raw.includes('<') && raw.includes('>')) {
        return sanitizeHtml(raw);
      }
      const lines = escapeHtml(raw).split('\n');
      let out = '';
      let inOl = false;
      let inUl = false;
      const closeLists = () => {
        if (inOl) { out += '</ol>'; inOl = false; }
        if (inUl) { out += '</ul>'; inUl = false; }
      };
      lines.forEach((line) => {
        const trimmed = line.trim();
        const olMatch = trimmed.match(/^(\d+)\.\s+(.*)$/);
        const ulMatch = trimmed.match(/^[-*]\s+(.*)$/);
        if (olMatch) {
          if (inUl) { out += '</ul>'; inUl = false; }
          if (!inOl) { out += '<ol>'; inOl = true; }
          out += `<li>${olMatch[2]}</li>`;
          return;
        }
        if (ulMatch) {
          if (inOl) { out += '</ol>'; inOl = false; }
          if (!inUl) { out += '<ul>'; inUl = true; }
          out += `<li>${ulMatch[1]}</li>`;
          return;
        }
        closeLists();
        out += trimmed ? `${trimmed}<br>` : '<br>';
      });
      closeLists();
      return out;
    }

    function renderChat() {
      const box = el('chat-box'); if (!box || !state.selectedTraining) return;
      box.innerHTML = state.selectedTraining.chatHistory.map(m => `<div class="msg ${m.from}">${formatMessage(m.text)}<span class="timestamp">${m.time || ''}</span></div>`).join('');
      box.scrollTop = box.scrollHeight;
    }
