<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>APAC AI Training Platform</title>
  <style>
    :root {
      --blue: #4130c7;
      --blue-dark: #26146f;
      --bg: linear-gradient(180deg, #f5f4fd 0%, #ece9fa 100%);
      --text: #120d33;
      --muted: #4e4770;
      --card: #ffffff;
      --surface: #f6f4fd;
      --surface-strong: #eeebfb;
      --line: rgba(38, 20, 111, 0.14);
      --line-strong: rgba(38, 20, 111, 0.22);
      --success: #0f7a3f;
      --danger: #b42318;
      --radius: 14px;
      --shadow: 0 20px 40px rgba(39, 24, 114, 0.12);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: var(--bg); color: var(--text); }
    a { color: var(--blue); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .page-shell { max-width: 1520px; margin: 0 auto; padding: 24px; }
    /* Top nav */
    .nav { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.98); padding: 18px 22px; border-radius: 18px; box-shadow: var(--shadow); border: 1px solid var(--line); }
    .nav-left { display: flex; gap: 12px; align-items: center; }
    .home-icon { width: 40px; height: 40px; border-radius: 12px; background: linear-gradient(135deg, #ece9ff 0%, #d8d1ff 100%); display: grid; place-items: center; color: var(--blue); }
    .nav-title { font-weight: 700; font-size: 18px; letter-spacing: -0.02em; }
    .nav-sub { color: var(--muted); font-size: 13px; }
    .nav-actions { display: flex; align-items: center; gap: 14px; }
    .link-btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 10px; border-radius: 10px; color: var(--muted); background: #f6f4fd; border: 1px solid rgba(64, 45, 132, 0.12); cursor: pointer; font-size: 13px; }
    .link-btn.logout { color: #c62828; border-color: #f5d7d7; background: #fff7f7; }
    .link-btn:hover { border-color: var(--blue); color: var(--blue); }
    .link-btn.logout:hover { border-color: #e53935; color: #e53935; }
    /* Auth shells */
    .auth-wrap { display: flex; justify-content: center; align-items: flex-start; min-height: auto; padding: 24px 24px 0; }
    .auth-card { background: #fff; width: min(760px, 95vw); padding: 32px 36px; border-radius: 22px; box-shadow: var(--shadow); border: 1px solid rgba(64, 45, 132, 0.12); }
    .auth-header { text-align: center; }
    .icon-circle { width: 62px; height: 62px; border-radius: 50%; background: rgba(91, 75, 219, 0.12); display: grid; place-items: center; color: var(--blue); margin: 0 auto 12px; }
    .auth-title { font-size: 20px; font-weight: 700; margin: 0 0 4px; }
    .auth-sub { color: var(--muted); margin: 0 0 18px; font-size: 14px; }
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 14px 18px; }
    .form-grid.single { grid-template-columns: 1fr; }
    label { font-size: 13px; color: #29214d; margin-bottom: 6px; display: block; font-weight: 600; }
    .field { display: flex; align-items: center; gap: 8px; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; background: #fcfbff; }
    .field input, .field select { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; color: var(--text); }
    .field:focus-within { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(65,48,199,0.14); background: #fff; }
    .icon-mini { width: 16px; height: 16px; color: #7c88a6; flex-shrink: 0; }
    .muted-box { border: 1px dashed var(--line-strong); border-radius: 12px; padding: 24px 16px; display: grid; place-items: center; color: #665d8f; background: var(--surface); min-height: 150px; text-align: center; }
    .training-panel { border: 1px dashed var(--line-strong); border-radius: 12px; background: var(--surface); height: 260px; overflow: hidden; position: relative; padding: 12px; }
    .training-panel .muted-box { border: none; background: transparent; position: absolute; inset: 0; display: grid; place-items: center; height: 100%; }
    .training-list { display: grid; gap: 12px; max-height: 236px; overflow: auto; padding: 4px; position: relative; }
    .training-item { border: 1px solid #dde2f0; border-radius: 12px; padding: 14px 16px; background: #fff; box-shadow: 0 6px 18px rgba(16, 12, 49, 0.05); display: flex; gap: 10px; align-items: flex-start; cursor: pointer; transition: border 0.15s, box-shadow 0.15s, background 0.15s; }
    .training-item.selected { border-color: var(--blue); background: #ece9ff; box-shadow: 0 8px 20px rgba(65,48,199,0.15); }
    .training-desc { color: #564f79; font-size: 13px; margin: 4px 0 0; line-height: 1.45; }
    .primary { width: 100%; border: none; border-radius: 12px; padding: 13px; font-size: 15px; font-weight: 700; color: #fff; background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%); cursor: pointer; box-shadow: 0 10px 24px rgba(57, 41, 136, 0.22); margin-top: 10px; }
    .primary:hover { background: var(--blue-dark); }
    .primary:disabled,
    .primary.is-disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
    .primary.is-disabled { pointer-events: none; }
    .assess-option { border: 1px solid #d8deed; background: #f7f9fe; border-radius: 10px; padding: 8px 10px; font-size: 13px; cursor: pointer; text-align: left; }
    .assess-option:hover { border-color: var(--blue); color: var(--blue); }
    .assess-option.selected { border-color: #1c8c4a; background: #e8f8ef; color: #1c8c4a; }
    .footer-text { text-align: center; font-size: 13px; color: var(--muted); margin-top: 12px; }
    /* Dashboard */
    .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: var(--shadow); border: 1px solid var(--line); }
    .profile-card { background: linear-gradient(135deg, #5b4bdb 0%, #38239f 100%); color: #fff; padding: 18px 20px; border-radius: 16px; box-shadow: 0 14px 32px rgba(57, 41, 136, 0.28); display: flex; justify-content: space-between; align-items: center; }
    .profile-meta { line-height: 1.4; }
    .profile-meta .label { font-size: 13px; opacity: 0.85; }
    .big-count { font-size: 32px; font-weight: 800; text-align: right; }
    .section-row { display: flex; justify-content: space-between; align-items: center; margin: 18px 0 10px; }
    .section-title { font-weight: 700; font-size: 16px; }
    .add-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 16px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 10px 22px rgba(65,48,199,0.22); }
    .add-btn:hover { background: var(--blue-dark); }
    .group-card { background: var(--surface); border-radius: 14px; padding: 18px; border: 1px solid rgba(64, 45, 132, 0.10); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); }
    .group-header { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .badge { background: #dfe9ff; color: var(--blue); padding: 6px 10px; border-radius: 999px; font-size: 12px; }
    .training-row { background: #fff; border-radius: 12px; padding: 14px 16px; border: 1px solid #dfe4f0; box-shadow: 0 6px 20px rgba(16,12,49,0.05); display: grid; grid-template-columns: 1fr auto; gap: 14px; align-items: center; margin-top: 12px; }
    .reports-grid { display: grid; gap: 14px; }
    .report-card { background: var(--surface); border-radius: 14px; padding: 18px; border: 1px solid rgba(64, 45, 132, 0.10); box-shadow: inset 0 1px 0 rgba(255,255,255,0.6); }
    .report-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .report-meta { color: #564f79; font-size: 13px; margin-top: 4px; line-height: 1.45; }
    .report-training-group { margin-top: 14px; border-top: 1px solid rgba(64, 45, 132, 0.08); padding-top: 14px; }
    .report-training-group:first-of-type { margin-top: 12px; }
    .train-name { font-weight: 700; color: #1f2a44; margin-bottom: 4px; }
    .status-chip { border: 1px solid #dfe4ed; border-radius: 18px; padding: 6px 10px; font-size: 12px; display: inline-flex; align-items: center; gap: 6px; color: #4b556b; }
    .status-chip.not { background: #f8fafc; }
    .status-chip.in { background: #e8f1ff; color: var(--blue); }
    .status-chip.done { background: #e8f8ef; color: #1c8c4a; border-color: #d3eddc; }
    .progress-wrap { display: flex; align-items: center; gap: 10px; font-size: 13px; color: #4b556b; }
    .progress-bar { width: 120px; height: 8px; border-radius: 999px; background: #e4e8f1; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--blue); }
    .start-btn { padding: 10px 16px; border-radius: 12px; border: none; background: var(--blue); color: #fff; font-weight: 700; cursor: pointer; box-shadow: 0 10px 22px rgba(13,91,255,0.25); }
    .start-btn:hover { background: var(--blue-dark); }
    /* Training view */
    .training-layout { margin-top: 16px; }
    .training-top { display: flex; align-items: center; gap: 12px; }
    .phase-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin: 10px 0 2px; }
    .phase-tab { border: 1px solid #dfe4f2; background: #f7f9fe; border-radius: 12px; padding: 8px 12px; font-size: 13px; color: #324a7a; cursor: default; display: inline-flex; gap: 8px; align-items: center; }
    .phase-tab.current { border-color: var(--blue); background: #e7edff; color: var(--blue); }
    .phase-tab.done { border-color: #cfead7; background: #f2fbf5; color: #1c8c4a; }
    .phase-tab.phase-tab--clickable { cursor: pointer; transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease; }
    .phase-tab.phase-tab--clickable:hover { transform: translateY(-1px); box-shadow: 0 8px 18px rgba(16,12,49,0.08); border-color: #9fb4f2; }
    .training-overview { display: grid; gap: 14px; margin-top: 10px; }
    .training-overview-hero { padding: 16px 18px; border-radius: 16px; background: linear-gradient(135deg, #f0ecff 0%, #fbfaff 100%); border: 1px solid rgba(65, 48, 199, 0.14); box-shadow: inset 0 1px 0 rgba(255,255,255,0.75); }
    .training-overview-kicker { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); }
    .training-overview-title { margin-top: 6px; font-size: 22px; font-weight: 800; letter-spacing: -0.03em; color: var(--blue-dark); }
    .training-overview-text { margin-top: 8px; color: #4f4873; font-size: 14px; line-height: 1.6; }
    .training-overview-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
    .training-overview-phase { padding: 16px; border-radius: 16px; border: 1px solid #dfe3f2; background: linear-gradient(180deg, #ffffff 0%, #f8f6ff 100%); box-shadow: 0 10px 22px rgba(16,12,49,0.06); }
    .training-overview-phase-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .training-overview-phase-label { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: var(--blue); }
    .training-overview-phase-name { margin-top: 6px; font-size: 17px; font-weight: 800; color: #211852; line-height: 1.2; overflow-wrap: anywhere; word-break: break-word; }
    .training-overview-phase-count { padding: 6px 10px; border-radius: 999px; background: #ebe7ff; color: var(--blue-dark); font-size: 11px; font-weight: 800; white-space: nowrap; }
    .training-overview-phase-list { margin: 12px 0 0; padding: 0; list-style: none; color: #534b78; display: grid; gap: 10px; }
    .training-overview-activity { display: grid; grid-template-columns: 132px minmax(0, 1fr); gap: 12px; align-items: start; padding: 10px 12px; border-radius: 14px; background: #ffffff; border: 1px solid #e1e5f2; }
    .training-overview-activity-label { display: inline-flex; align-items: center; justify-content: flex-start; padding: 8px 10px; border-radius: 12px; background: #ece9ff; color: var(--blue-dark); font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
    .training-overview-activity-text { color: #3f3962; line-height: 1.5; overflow-wrap: anywhere; word-break: break-word; min-width: 0; }
    .chat-shell { border: 1px solid rgba(28, 31, 39, 0.28); border-radius: 18px; overflow: hidden; background: #2b2f39; display: flex; flex-direction: column; height: 560px; box-shadow: 0 14px 30px rgba(16,12,49,0.12); }
    .chat-box { flex: 1; overflow: auto; background: linear-gradient(180deg, #343946 0%, #2a2f3a 100%); padding: 20px; }
    .msg { padding: 12px 14px; border-radius: 12px; margin-bottom: 10px; max-width: 80%; box-shadow: 0 6px 18px rgba(27,63,140,0.07); }
    .bot { background: #454b5b; color: #f8f9fc; }
    .user { background: #d8cdfc; color: #1d1448; margin-left: auto; }
    .timestamp { display: block; font-size: 11px; color: rgba(255,255,255,0.65); margin-top: 4px; }
    .chat-input { display: flex; gap: 10px; padding: 12px; border-top: 1px solid rgba(255,255,255,0.08); background: #262a33; align-items: center; }
    .chat-input input { flex: 1; background: #1e2129; color: #f7f8fc; border-radius: 10px; border: 1px solid rgba(255,255,255,0.16); padding: 10px 12px; }
    .chat-input input::placeholder { color: rgba(255,255,255,0.56); }
    .chat-input input:disabled { opacity: 0.55; cursor: not-allowed; }
    .chat-input button { width: 120px; border-radius: 10px; }
    .chat-input button:disabled { opacity: 0.55; cursor: not-allowed; }
    .light-btn { padding: 9px 13px; border-radius: 10px; border: 1px solid #cfd7ea; background: #fff; color: #261f47; cursor: pointer; font-size: 13px; font-weight: 600; }
    .light-btn:hover { border-color: var(--blue); color: var(--blue); }
    .danger-btn { color: #c62828; border-color: #f5d7d7; background: #fff7f7; }
    .danger-btn:hover { border-color: #e53935; color: #e53935; }
    .admin-user-modal-backdrop { position: fixed; inset: 0; background: rgba(18, 13, 51, 0.42); display: grid; place-items: center; padding: 24px; z-index: 1000; }
    .admin-user-modal { width: min(760px, 96vw); max-height: calc(100vh - 48px); overflow: auto; background: #fff; border-radius: 20px; border: 1px solid var(--line); box-shadow: 0 24px 60px rgba(39, 24, 114, 0.22); padding: 22px; }
    .admin-user-modal-header { display: flex; justify-content: space-between; align-items: start; gap: 12px; margin-bottom: 14px; }
    .admin-user-modal-title { font-weight: 700; font-size: 18px; }
    .admin-user-modal-sub { color: var(--muted); font-size: 13px; margin-top: 4px; }
    .admin-user-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    .label-with-help { display: inline-flex; align-items: center; gap: 8px; }
    .hover-help { display:inline-grid; place-items:center; width:18px; height:18px; border-radius:999px; border:1px solid #cdbff4; background:#f5f0ff; color:#4b2a94; font-size:11px; font-weight:800; cursor:help; }
    .training-help-layout { display:grid; grid-template-columns: 220px minmax(0, 1fr); gap: 20px; align-items:start; }
    .training-help-topics { position: sticky; top: 0; align-self: start; border:1px solid #e1daf6; border-radius:16px; padding:14px; background:linear-gradient(180deg, #faf7ff 0%, #f3f6ff 100%); display:grid; gap:8px; }
    .training-help-topic-title { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #6956b0; }
    .training-help-topics a { text-decoration:none; color:#2d2356; font-weight:700; padding:8px 10px; border-radius:10px; border:1px solid transparent; }
    .training-help-topics a:hover { background:#ffffff; border-color:#d9d0f7; color:#4b2a94; }
    .training-help-content { display:grid; gap:18px; font-size:14px; color:var(--text); line-height:1.6; }
    .training-help-section { scroll-margin-top: 12px; }
    @media (max-width: 900px) {
      .training-help-layout { grid-template-columns: 1fr; }
      .training-help-topics { position: static; }
    }
    .field textarea { border: none; background: transparent; outline: none; width: 100%; font-size: 14px; color: var(--text); font-family: inherit; resize: vertical; min-height: 90px; }
    .phase-builder { margin-top: 18px; border: 1px solid #d9def0; border-radius: 18px; padding: 18px; background: linear-gradient(180deg, #fcfbff 0%, #f6f4fd 100%); }
    .phase-builder-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 16px; }
    .phase-card { background: #fff; border: 1px solid #dbe1f0; border-radius: 16px; padding: 16px; margin-bottom: 16px; box-shadow: 0 8px 22px rgba(16,12,49,0.05); }
    .phase-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 14px; margin-bottom: 12px; flex-wrap: wrap; }
    .phase-title { display: flex; align-items: center; gap: 10px; flex: 1; min-width: min(100%, 460px); }
    .phase-name-input { width: 100%; border: 1px solid #cad3ea; border-radius: 12px; padding: 11px 12px; background: #fff; font-size: 15px; color: var(--text); font-weight: 600; }
    .phase-tools { display: flex; gap: 10px; flex-wrap: wrap; }
    .chip-btn { border: 1px solid var(--activity-border, #cad3ea); background: var(--activity-soft, #fff); border-radius: 999px; padding: 7px 12px; font-size: 12px; cursor: pointer; color: var(--activity-text, #2f2757); font-weight: 600; }
    .chip-btn:hover { border-color: var(--activity-border-strong, var(--blue)); color: var(--activity-text, var(--blue)); transform: translateY(-1px); }
    .phase-items { display: grid; gap: 10px; margin-top: 12px; }
    .phase-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 14px; border-radius: 14px; border: 1px solid var(--activity-border, #dde3f0); background: linear-gradient(180deg, var(--activity-base, #fcfcff) 0%, #ffffff 100%); box-shadow: inset 4px 0 0 var(--activity-accent, transparent); }
    .phase-item-body { display: flex; flex-direction: column; gap: 10px; flex: 1; min-width: 0; }
    .phase-item-config { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    .phase-item-config select, .phase-item-config input, .phase-item-config textarea { width: 100%; border: 1px solid #cad3ea; border-radius: 10px; padding: 8px 10px; background: #fff; font-size: 13px; font-family: inherit; color: var(--text); }
    .file-name { background: #f1f4fb; color: #4b556b; }
    .assessment-block { border: 1px solid #d9d0f7; border-radius: 18px; padding: 14px; background: linear-gradient(180deg, #fbf9ff 0%, #f4f6ff 100%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.75); display: grid; gap: 12px; }
    .assessment-header { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 12px 14px; border-radius: 14px; background: linear-gradient(135deg, #efe8ff 0%, #eef4ff 100%); border: 1px solid #d9d0f7; }
    .assessment-question { border: 1px solid #dfe5f5; border-radius: 16px; padding: 14px; background: linear-gradient(180deg, #ffffff 0%, #fdfcff 100%); margin-top: 4px; box-shadow: 0 10px 22px rgba(16,12,49,0.05); display: grid; gap: 10px; }
    .assessment-question.dragging { opacity: 0.55; }
    .assessment-header-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
    .assessment-total-wrap { display:flex; align-items:center; gap:10px; }
    .assessment-total-caption { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #6956b0; white-space: nowrap; }
    .assessment-total-input { width: 110px; border: 1px solid #cad3ea; border-radius: 12px; padding: 10px 12px; font-size: 18px; font-weight: 800; text-align: center; color: #241a55; background: #f4f6ff; }
    .assessment-question.is-collapsed .assessment-top,
    .assessment-question.is-collapsed .assessment-options { display: none; }
    .assessment-top { display: grid; grid-template-columns: 1fr auto auto auto; gap: 8px; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #ece7ff; }
    .assessment-question-head { display:flex; justify-content:space-between; align-items:flex-start; gap:14px; }
    .assessment-question-label { display: flex; align-items: center; gap: 10px; font-weight: 800; color: #241a55; font-size: 15px; letter-spacing: -0.01em; }
    .assessment-section-title { display: flex; align-items: center; gap: 10px; font-weight: 800; color: #241a55; margin-top: 4px; }
    .assessment-drag-handle { font-size: 13px; color: #7c88a6; cursor: grab; user-select: none; }
    .assessment-options { margin-top: 2px; display: grid; gap: 8px; }
    .assessment-option { display: grid; grid-template-columns: 92px minmax(0,1fr) auto auto auto; gap: 10px; align-items: center; padding: 6px 0; border-bottom: 1px solid #ebe6ff; }
    .assessment-option:last-child { border-bottom: none; }
    .assessment-option-label { font-weight: 700; color: #4b2a94; }
    .assessment-option label.training-desc { display: inline-flex; align-items: center; gap: 8px; margin: 0; padding: 6px 10px; border-radius: 999px; background: #ffffff; border: 1px solid #d8def0; color: #40385f; font-weight: 600; }
    .assessment-option .assess-option-correct { width: 16px; height: 16px; }
    .assessment-block .add-question-btn { background: #ffffff; border-color: #cdbff4; color: #4b2a94; }
    .assessment-block .add-option-btn { background: linear-gradient(135deg, #f1ebff 0%, #eef4ff 100%); border-color: #cdbff4; color: #42237e; font-weight: 700; }
    .assessment-block .add-option-btn:hover,
    .assessment-block .add-question-btn:hover { border-color: #8b68de; color: #4b2a94; }
    .assessment-marking { display:flex; align-items:flex-start; gap:10px; }
    .assessment-marking-toggle { display:grid; border:2px solid #214b5a; border-radius:10px; overflow:hidden; min-width:156px; }
    .assessment-marking-btn { border:none; padding:4px 10px; font-weight:700; font-size:12px; text-align:left; cursor:pointer; background:#fff4f4; color:#ffffff; }
    .assessment-marking-btn.mode-combined.active { background:#58a93d; color:#ffffff; }
    .assessment-marking-btn.mode-combined:not(.active) { background:#e7f5e1; color:#2f6f1f; }
    .assessment-marking-btn.mode-individual.active { background:#d41212; color:#ffffff; }
    .assessment-marking-btn.mode-individual:not(.active) { background:#fde7e7; color:#9a1d1d; }
    .assessment-marking-input { width:84px; border:2px solid #214b5a; border-radius:0; padding:8px 10px; font-size:18px; font-weight:700; text-align:center; background:#fff; color:#241a55; }
    .assessment-marking-input:disabled { background:#f3f5fa; color:#5b6280; }
    .assessment-option-marks { width:78px; border:1px solid #cad3ea; border-radius:10px; padding:8px 10px; font-size:13px; font-weight:700; text-align:center; background:#fff; color:var(--text); }
    .assessment-option-marks:disabled { background:#f3f5fa; color:#9aa1b8; }
    .assessment-footer { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; padding: 14px; border-radius: 16px; background: linear-gradient(135deg, #fff9ef 0%, #f6f1ff 100%); border: 1px solid #eadfc0; }
    .assessment-footer-card { display:grid; grid-template-columns:minmax(180px,1fr) 150px; align-items:stretch; gap:0; padding:0; border-radius:16px; background:#ffffff; border:1px solid #e3dbf5; box-shadow: inset 0 1px 0 rgba(255,255,255,0.8); overflow:hidden; }
    .assessment-footer-label { font-size: 11px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; color: #6956b0; }
    .assessment-footer-display { display:grid; place-items:center; background:linear-gradient(135deg, #2b6f90 0%, #255f7e 100%); color:#ffffff; padding:10px 18px; font-size:20px; font-weight:400; letter-spacing:0.12em; text-transform:uppercase; min-height:56px; }
    .assessment-footer-input-wrap { display:grid; place-items:center; background:#ffffff; padding:10px 14px; }
    .assessment-footer-input { width:100%; height:100%; min-height:40px; border:none; outline:none; font-size:28px; font-weight:700; text-align:center; color:#241a55; background:transparent; }
    .tiny-btn { border: 1px solid #cad3ea; background: #fff; border-radius: 10px; padding: 5px 9px; font-size: 11px; cursor: pointer; color: #29214d; }
    .tiny-btn:hover { border-color: var(--blue); color: var(--blue); }
    .assessment-result { margin: 16px auto 0; padding: 18px 22px; border-radius: 16px; text-align: center; font-size: 24px; font-weight: 800; letter-spacing: -0.02em; width: min(100%, 680px); box-shadow: 0 12px 28px rgba(39, 24, 114, 0.10); }
    .assessment-result.pass { background: #e8f8ef; color: #1c8c4a; border: 1px solid #cfead7; }
    .assessment-result.fail { background: #fff2f2; color: #c62828; border: 1px solid #f1caca; }
    .phase-item-header { display: flex; align-items: center; gap: 10px; width: 100%; flex-wrap: wrap; }
    .phase-item-header .activity-chip { cursor: pointer; }
    .collapse-btn { border: 1px solid #cad3ea; background: #fff; border-radius: 10px; padding: 5px 9px; font-size: 11px; cursor: pointer; color: #29214d; min-width: 34px; }
    .collapse-btn:hover { border-color: var(--blue); color: var(--blue); }
    .phase-item-body.is-collapsed .phase-item-config { display: none; }
    .phase-item-body.is-collapsed .assessment-block { display: none; }
    .phase-item.dragging { opacity: 0.6; }
    .drag-handle { font-size: 12px; color: #7c88a6; cursor: grab; user-select: none; }
    .activity-chip { background: var(--activity-soft, #ece9ff); color: var(--activity-text, #2b2072); border-radius: 999px; padding: 5px 10px; font-size: 12px; font-weight: 700; border: 1px solid var(--activity-border, transparent); }
    .mini-btn { margin-left: auto; border: 1px solid #cad3ea; background: #fff; border-radius: 10px; padding: 7px 11px; font-size: 12px; cursor: pointer; color: #29214d; }
    .mini-btn:hover { border-color: var(--danger); color: var(--danger); }
    @media (max-width: 900px) {
      .training-row { grid-template-columns: 1fr; }
      .nav { flex-direction: column; align-items: flex-start; gap: 8px; }
      .phase-title { min-width: 100%; }
      .phase-item-config { grid-template-columns: 1fr; }
      .assessment-top { grid-template-columns: 1fr; }
      .training-overview-activity { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    // Storage keys
    const TEMPLATES_KEY = 'aipt_templates';
    const RESET_KEY = 'aipt_reset_done';
    const VIDEO_LIBRARY_KEY = 'aipt_video_library';
    const PDF_LIBRARY_KEY = 'aipt_pdf_library';

    // App base path (IIS virtual directory). Empty for local dev.
    const BASE_PATH = '/training-platform';
    const RUNTIME_URL = new URL(window.location.href);
    const HUB_AUTH_STORAGE_KEY = 'apac_hub_auth_user';

    // Role -> training templates (loaded from storage or defaults)
    let roleTrainingTemplates;
    let templatesCache = null;
    let templatesLoaded = false;

    const state = {
      view: 'loading',
      currentUser: null,
      authUser: null,
      selectedTraining: null,
      showAddPanel: false,
      showProfileEditor: false,
      isAdmin: false,
      accessType: 'trainee',
      showMentor: false,
      mentorReason: '',
      sessionResolved: false,
      sessionError: '',
      userLoadError: '',
      registrationMessage: '',
      registrationMessageType: 'error',
      showTrainingManagementHelp: false,
      confirmDialog: null
    };
    const el = (id) => document.getElementById(id);
    const ACTIVITY_TYPES = [
      { type: 'doc', label: 'Documentation reading', theme: { base: '#fbfdff', soft: '#edf5ff', border: '#b8d2f8', borderStrong: '#6ea3ec', text: '#184b95', accent: '#6ea3ec' } },
      { type: 'lms', label: 'LMS/Workday Course', theme: { base: '#fbfefc', soft: '#ecf9f1', border: '#b6e5ca', borderStrong: '#59b985', text: '#15613d', accent: '#59b985' } },
      { type: 'video', label: 'Watch video', theme: { base: '#fffdfc', soft: '#fff1ed', border: '#f4c2b5', borderStrong: '#e18b75', text: '#8f2c1c', accent: '#e18b75' } },
      { type: 'assessment', label: 'Assessment', theme: { base: '#fffef9', soft: '#fff7e9', border: '#f0d7a1', borderStrong: '#d6aa47', text: '#7a5200', accent: '#d6aa47' } },
      { type: 'text', label: 'Formatted text', theme: { base: '#fcfbff', soft: '#f1ecff', border: '#cdbbf2', borderStrong: '#9673dc', text: '#4b2a94', accent: '#9673dc' } },
      { type: 'handson', label: 'Hands-on activity', theme: { base: '#fcfeff', soft: '#edf8fa', border: '#b6dfe6', borderStrong: '#63afbc', text: '#135962', accent: '#63afbc' } },
      { type: 'ai-chat', label: 'Mentor session', theme: { base: '#fffdfd', soft: '#f8eef6', border: '#e4bfd9', borderStrong: '#c678b2', text: '#7b215f', accent: '#c678b2' } }
    ];
    let adminDraftTraining = { editingId: '', originalRole: '', roleSelect: '', roleNew: '', name: '', description: '', createdByEmail: '', contributorEmails: [], phases: [] };
    let dragState = null;
    let videoLibrary = [];
    let pdfLibrary = [];
    let librariesLoaded = false;
    let missionsCache = [];
    let missionsLoaded = false;
    let lastMentorRequest = null;
    let adminTrainingMentorMissionId = '';
    let adminTrainingMentorFolderId = '';
    let adminUserEditDraft = null;
    const foldersByMission = {};
    const foldersLoading = {};
    const pendingUploadFiles = {};
    const assessmentTimers = new Map();
    let activeAssessmentKey = '';

    // One-time cleanup of prior data in localStorage
    function clearExistingDataOnce() {
      if (localStorage.getItem(RESET_KEY)) return;
      localStorage.removeItem(TEMPLATES_KEY);
      localStorage.setItem(RESET_KEY, '1');
    }

    // Storage helpers
    let usersCache = [];
    let usersLoaded = false;
    let usersLoadResolved = false;
    const loadUsers = () => usersCache;
    const normalizeEmail = (value) => String(value || '').trim().toLowerCase();
    function normalizeEmbeddedEmail(value) {
      return String(value || '').trim().toLowerCase();
    }
    const normalizeAccessType = (value) => ['trainee', 'trainer', 'admin'].includes(String(value || '').trim().toLowerCase()) ? String(value || '').trim().toLowerCase() : 'trainee';
    const FETCH_TIMEOUT_MS = 12000;
    const currentUserEmail = () => normalizeEmail(state.currentUser?.email || state.authUser?.email || '');
    const currentUserName = () => state.currentUser?.name || state.authUser?.name || state.authUser?.email || 'User';
    const hasAdminAccess = () => normalizeAccessType(state.currentUser?.accessType || state.accessType) === 'admin';
    const hasTrainerAccess = () => {
      const access = normalizeAccessType(state.currentUser?.accessType || state.accessType);
      return access === 'trainer' || access === 'admin';
    };
    const findUser = (email) => loadUsers().find(u => normalizeEmail(u.email) === normalizeEmail(email));
    const clearSession = () => { /* SSO-backed session handled by App Service auth */ };
    const loadLibrary = (key) => { try { return JSON.parse(localStorage.getItem(key)) || []; } catch { return []; } };
    const saveLibrary = (key, list) => localStorage.setItem(key, JSON.stringify(list));

    function getHubAuthUser() {
      const queryName = (RUNTIME_URL.searchParams.get('user_name') || '').trim();
      const queryEmail = normalizeEmbeddedEmail(RUNTIME_URL.searchParams.get('user_email') || '');
      if (queryEmail) {
        return {
          name: queryName || queryEmail,
          email: queryEmail
        };
      }

      try {
        const stored = JSON.parse(window.sessionStorage.getItem(HUB_AUTH_STORAGE_KEY) || 'null');
        const storedEmail = normalizeEmbeddedEmail(stored?.email || '');
        if (storedEmail) {
          return {
            name: String(stored?.name || storedEmail).trim(),
            email: storedEmail
          };
        }
      } catch (_error) {
        // Ignore storage read issues.
      }

      try {
        const parentUser = window.parent && window.parent !== window ? window.parent.__hubAuthUser : null;
        const parentEmail = normalizeEmbeddedEmail(parentUser?.email || '');
        if (parentEmail) {
          return {
            name: String(parentUser?.name || parentEmail).trim(),
            email: parentEmail
          };
        }
      } catch (_error) {
        // Ignore cross-frame access failures.
      }

      return null;
    }

    async function fetchWithTimeout(url, options = {}, timeoutMs = FETCH_TIMEOUT_MS) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    function normalizeUserShape(user) {
      if (!user) return null;
      return {
        ...user,
        email: normalizeEmail(user.email || user.employeeId),
        trainingRole: user.trainingRole || user.role || '',
        managerEmail: normalizeEmail(user.managerEmail || user.managerEmployeeId || ''),
        accessType: normalizeAccessType(user.accessType || 'trainee'),
        approvals: Array.isArray(user.approvals) ? user.approvals : [],
        trainings: Array.isArray(user.trainings) ? user.trainings : []
      };
    }

    function normalizeTemplatesShape(templates) {
      const next = {};
      Object.keys(templates || {}).forEach(role => {
        const items = Array.isArray(templates[role]) ? templates[role] : [];
        next[role] = items.map(item => ({
          ...item,
          createdByEmail: normalizeEmail(item.createdByEmail),
          contributorEmails: Array.isArray(item.contributorEmails) ? Array.from(new Set(item.contributorEmails.map(normalizeEmail).filter(Boolean))) : []
        }));
      });
      return next;
    }

    function canEditTrainingTemplate(template) {
      if (hasAdminAccess()) return true;
      const myEmail = currentUserEmail();
      const createdByEmail = normalizeEmail(template?.createdByEmail);
      const contributors = Array.isArray(template?.contributorEmails) ? template.contributorEmails.map(normalizeEmail) : [];
      return createdByEmail === myEmail || contributors.includes(myEmail);
    }

    async function ensureUsersLoaded() {
      if (usersLoadResolved) return usersLoaded;
      try {
        const res = await fetchWithTimeout(`${BASE_PATH}/api/users`, { credentials: 'include' });
        if (!res.ok) throw new Error('Users fetch failed');
        const data = await res.json();
        usersCache = Array.isArray(data) ? data.map(normalizeUserShape).filter(Boolean) : [];
        state.userLoadError = '';
        usersLoaded = true;
        usersLoadResolved = true;
        return true;
      } catch (error) {
        usersCache = [];
        usersLoaded = false;
        usersLoadResolved = true;
        state.userLoadError = error?.name === 'AbortError'
          ? 'Loading existing training profiles timed out. You can still register your own profile below.'
          : 'Unable to load existing training profiles from the server right now. You can still register your own profile below.';
        return false;
      }
    }

    async function fetchCurrentProfile(email) {
      const normalizedEmail = normalizeEmail(email);
      if (!normalizedEmail) {
        return null;
      }

      const res = await fetchWithTimeout(`${BASE_PATH}/api/users/${encodeURIComponent(normalizedEmail)}`, {
        credentials: 'include'
      });

      if (res.status === 404) {
        return null;
      }

      if (!res.ok) {
        let detail = '';
        try { detail = await res.text(); } catch { /* ignore */ }
        throw new Error(`Profile lookup failed (${res.status}${detail ? `): ${detail}` : ')'}`);
      }

      return normalizeUserShape(await res.json());
    }

    async function createUser(user) {
      const res = await fetchWithTimeout(`${BASE_PATH}/api/users`, {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(user)
      });
      if (!res.ok) {
        if (res.status === 409) throw new Error('User already exists.');
        throw new Error('User creation failed.');
      }
      const created = normalizeUserShape(await res.json());
      usersCache.push(created);
      return created;
    }

    async function updateUser(user) {
      const targetEmail = normalizeEmail(user.originalEmail || user.email);
      const payload = { ...user };
      delete payload.originalEmail;
      const res = await fetchWithTimeout(`${BASE_PATH}/api/users/${encodeURIComponent(targetEmail)}`, {
        method: 'PUT',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        let detail = '';
        try { detail = await res.text(); } catch { /* ignore */ }
        throw new Error(`User update failed (${res.status}${detail ? `): ${detail}` : ')'}`);
      }
      const updated = normalizeUserShape(await res.json());
      const idx = usersCache.findIndex(u => normalizeEmail(u.email) === targetEmail);
      if (idx >= 0) usersCache[idx] = updated;
      if (state.currentUser && normalizeEmail(state.currentUser.email) === targetEmail) {
        state.currentUser = updated;
        state.accessType = normalizeAccessType(updated.accessType);
        state.isAdmin = hasAdminAccess();
      }
      return updated;
    }

    async function removeUser(email) {
      const res = await fetchWithTimeout(`${BASE_PATH}/api/users/${encodeURIComponent(normalizeEmail(email))}`, { method: 'DELETE', credentials: 'include' });
      if (!res.ok) throw new Error('User delete failed.');
      usersCache = usersCache.filter(u => normalizeEmail(u.email) !== normalizeEmail(email));
    }

    // Template helpers
    function defaultTemplates() {
      return {};
    }
    function loadTemplatesFromStorage() {
      try {
        const stored = JSON.parse(localStorage.getItem(TEMPLATES_KEY));
        if (stored && typeof stored === 'object') return normalizeTemplates(stored);
      } catch { /* ignore */ }
      return null;
    }
    async function ensureTemplatesLoaded() {
      if (templatesLoaded) return;
      let normalized = null;
      try {
        const res = await fetch(`${BASE_PATH}/api/templates`);
        if (!res.ok) throw new Error('Templates fetch failed');
        const data = await res.json();
        normalized = normalizeTemplates(data || {});
        if (!Object.keys(normalized).length) {
          const fallback = loadTemplatesFromStorage() || normalizeTemplates(defaultTemplates());
          normalized = fallback;
          persistTemplates(normalized).catch(() => {});
        }
      } catch {
        normalized = loadTemplatesFromStorage() || normalizeTemplates(defaultTemplates());
      }
      normalized = normalizeTemplatesShape(normalized);
      roleTrainingTemplates = normalized;
      templatesCache = normalized;
      templatesLoaded = true;
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(normalized));
    }
    function saveTemplates(data) {
      const normalized = normalizeTemplatesShape(normalizeTemplates(data));
      roleTrainingTemplates = normalized;
      templatesCache = normalized;
      localStorage.setItem(TEMPLATES_KEY, JSON.stringify(normalized));
      persistTemplates(normalized).catch(() => alert('Unable to save templates to server.'));
    }
    async function persistTemplates(templates) {
      const res = await fetch(`${BASE_PATH}/api/templates`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(templates)
      });
      if (!res.ok) throw new Error('Templates save failed');
    }
    const getRoleList = () => Object.keys(roleTrainingTemplates || {});
    const getPhaseName = (phase) => typeof phase === 'string' ? phase : (phase && phase.name ? phase.name : 'Untitled Phase');
    const activityLabel = (type) => (ACTIVITY_TYPES.find(t => t.type === type) || {}).label || type;
    const activityMeta = (type) => ACTIVITY_TYPES.find(t => t.type === type) || { theme: {} };
    const activityThemeVars = (type) => {
      const theme = activityMeta(type).theme || {};
      return `--activity-base:${theme.base || '#fcfcff'}; --activity-soft:${theme.soft || '#ece9ff'}; --activity-border:${theme.border || '#cad3ea'}; --activity-border-strong:${theme.borderStrong || '#5b4bdb'}; --activity-text:${theme.text || '#2f2757'}; --activity-accent:${theme.accent || '#5b4bdb'};`;
    };
    const activityPngIcon = (fileName, altText) => `<img src="/resources/${fileName}" alt="${escapeHtml(altText)}" style="width:14px; height:14px; object-fit:contain; vertical-align:middle;">`;
    const activityIcon = (type) => {
      if (type === 'doc') return activityPngIcon('Document_Reading_Icon.png', 'Document reading');
      if (type === 'lms') return activityPngIcon('LMS-Workday_Course_Icon.png', 'LMS/Workday course');
      if (type === 'video') return activityPngIcon('Watch_Video_Icon.png', 'Watch video');
      if (type === 'assessment') return activityPngIcon('Assessment_Icon.png', 'Assessment');
      if (type === 'text') return activityPngIcon('Formatted_Text_Icon.png', 'Formatted text');
      if (type === 'handson') return activityPngIcon('Hands-On_Activity_Icon.png', 'Hands-on activity');
      if (type === 'ai-chat') return activityPngIcon('Mentor_Sessions_Icon.png', 'Mentor session');
      return bookIcon();
    };
    const collapseArrow = (collapsed) => collapsed ? '&#9652;' : '&#9662;';
    const normalizeMarkValue = (value) => {
      const num = Number.parseFloat(value);
      return Number.isFinite(num) ? num : 0;
    };
    const getQuestionCombinedMarks = (question) => normalizeMarkValue(question?.combinedMarks || 0);
    const getQuestionIndividualMarks = (question) => (question?.options || []).reduce((sum, opt) => sum + ((opt && opt.correct) ? normalizeMarkValue(opt.markValue) : 0), 0);
    const getQuestionAvailableMarks = (question) => question?.markingMode === 'individual' ? getQuestionIndividualMarks(question) : getQuestionCombinedMarks(question);
    const getAssessmentTotalMarks = (assessment) => ((assessment?.questions) || []).reduce((sum, question) => sum + getQuestionAvailableMarks(question), 0);
    function refreshQuestionMarksInput(phaseIdx, itemIdx, qIdx) {
      const item = adminDraftTraining.phases[phaseIdx]?.items?.[itemIdx];
      const question = item?.assessment?.questions?.[qIdx];
      const input = document.querySelector(`.assess-question-marks[data-phase-index="${phaseIdx}"][data-item-index="${itemIdx}"][data-question-index="${qIdx}"]`);
      if (!question || !input || question.markingMode !== 'individual') return;
      input.value = getQuestionIndividualMarks(question);
    }
    function refreshAssessmentTotalInput(phaseIdx, itemIdx) {
      const item = adminDraftTraining.phases[phaseIdx]?.items?.[itemIdx];
      const input = document.querySelector(`.assessment-total-input[data-phase-index="${phaseIdx}"][data-item-index="${itemIdx}"]`);
      if (!item?.assessment || !input) return;
      input.value = getAssessmentTotalMarks(item.assessment);
    }
    const resourceUrl = (type, fileName) => {
      if (!fileName) return '';
      const base = type === 'video' ? `${BASE_PATH}/resources/videos/` : `${BASE_PATH}/resources/documents/`;
      return `${base}${encodeURIComponent(fileName)}`;
    };
    function normalizeAssessment(raw) {
      const data = raw && typeof raw === 'object' ? raw : {};
      if (Array.isArray(data.questions)) {
        return {
          passingMarks: data.passingMarks || '',
          durationMinutes: data.durationMinutes || '',
          maxRetries: data.maxRetries || '',
          collapsed: !!data.collapsed,
          questions: data.questions.map(q => ({
            text: q.text || '',
            collapsed: !!q.collapsed,
            markingMode: q.markingMode === 'individual' ? 'individual' : 'combined',
            combinedMarks: q.combinedMarks || '',
            options: Array.isArray(q.options) ? q.options.map(opt => ({
              text: opt.text || '',
              correct: !!opt.correct,
              markValue: opt.markValue || ''
            })) : []
          }))
        };
      }
      if (data.question || data.options || data.answers) {
        const options = Array.isArray(data.options) ? data.options : [];
        const answers = Array.isArray(data.answers) ? data.answers : [];
        return {
          passingMarks: data.passingMarks || '',
          durationMinutes: data.durationMinutes || '',
          maxRetries: data.maxRetries || '',
          collapsed: !!data.collapsed,
          questions: [{
            text: data.question || '',
            collapsed: false,
            markingMode: 'combined',
            combinedMarks: '',
            options: options.map(opt => ({
              text: opt,
              correct: answers.includes(opt),
              markValue: ''
            }))
          }]
        };
      }
      return { passingMarks: data.passingMarks || '', durationMinutes: data.durationMinutes || '', maxRetries: data.maxRetries || '', collapsed: !!data.collapsed, questions: [] };
    }

    function parseAssessmentMaxRetries(value) {
      const raw = String(value ?? '').trim();
      if (!raw) return null;
      return Math.max(0, Number.parseInt(raw, 10) || 0);
    }

    async function fetchLibrary(type) {
      const res = await fetch(`${BASE_PATH}/api/library/${type}`);
      if (!res.ok) throw new Error('Library fetch failed');
      const data = await res.json();
      return Array.isArray(data) ? data : [];
    }

    async function ensureLibrariesLoaded() {
      if (librariesLoaded) return;
      try {
        const [videos, documents] = await Promise.all([fetchLibrary('video'), fetchLibrary('document')]);
        videoLibrary = videos;
        pdfLibrary = documents;
        saveLibrary(VIDEO_LIBRARY_KEY, videoLibrary);
        saveLibrary(PDF_LIBRARY_KEY, pdfLibrary);
      } catch {
        videoLibrary = loadLibrary(VIDEO_LIBRARY_KEY);
        pdfLibrary = loadLibrary(PDF_LIBRARY_KEY);
      }
      librariesLoaded = true;
      if (state.view === 'admin-trainings') renderAdminTrainings();
    }

    async function ensureSessionResolved() {
      if (state.sessionResolved) return;
      try {
        const authUser = getHubAuthUser();
        state.authUser = authUser;
        state.sessionResolved = true;

        if (!authUser?.email) {
          state.sessionError = 'No SSO user context was provided by the Application Hub.';
          state.view = 'unauthorized';
          return;
        }

        state.sessionError = '';
        state.userLoadError = '';
        const profile = await fetchCurrentProfile(authUser.email);
        if (profile) {
          state.currentUser = profile;
          state.accessType = normalizeAccessType(profile.accessType);
          state.isAdmin = hasAdminAccess();
          state.view = 'dashboard';
          state.registrationMessage = '';
          ensureUsersLoaded().then(() => {
            if (state.view === 'dashboard' || state.view === 'admin-users') render();
          });
          return;
        }

        state.currentUser = null;
        state.accessType = 'trainee';
        state.isAdmin = hasAdminAccess();
        state.view = 'register';
      } catch (error) {
        state.sessionResolved = true;
        state.currentUser = null;
        state.view = 'register';
        state.userLoadError = error?.name === 'AbortError'
          ? 'Profile lookup timed out. You can still register your training profile below.'
          : (error?.message || 'Profile lookup failed. You can still register your training profile below.');
      }
    }

    async function ensureMissionsLoaded() {
      if (missionsLoaded) return;
      try {
        const res = await fetch(`${BASE_PATH}/api/matcha/missions`);
        if (!res.ok) throw new Error('Mission fetch failed');
        const data = await res.json();
        missionsCache = Array.isArray(data) ? data : [];
      } catch {
        missionsCache = [];
      }
      missionsLoaded = true;
      if (state.view === 'admin-trainings') renderAdminTrainings();
    }

    async function ensureFoldersLoaded(missionId) {
      if (!missionId || foldersByMission[missionId] || foldersLoading[missionId]) return;
      foldersLoading[missionId] = true;
      try {
        const res = await fetch(`${BASE_PATH}/api/matcha/folders?missionId=${encodeURIComponent(missionId)}`);
        if (!res.ok) throw new Error('Folder fetch failed');
        const data = await res.json();
        foldersByMission[missionId] = Array.isArray(data) ? data : [];
      } catch {
        foldersByMission[missionId] = [];
      }
      foldersLoading[missionId] = false;
      if (state.view === 'admin-trainings') renderAdminTrainings();

    async function uploadResource(type, file) {
      const form = new FormData();
      form.append('file', file);
      const res = await fetch(`${BASE_PATH}/api/upload/${type}`, { method: 'POST', body: form });
      if (!res.ok) throw new Error('Upload failed');
      return res.json();
    }

    function normalizeTemplates(templates) {
      const toSlug = (value) => String(value || '').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '') || `phase-${Date.now()}`;
      const normalized = {};
      Object.keys(templates || {}).forEach(role => {
        normalized[role] = (templates[role] || []).map((t, tIndex) => {
          const base = toSlug(t.id || t.name || `${role}-${tIndex}`);
          const phases = (t.phases || []).map((phase, pIndex) => {
            const phaseObj = typeof phase === 'string' ? { name: phase } : (phase || {});
            const phaseId = phaseObj.id || `${base}-phase-${pIndex}`;
            const items = (phaseObj.items || []).map((item, iIndex) => {
              const itemObj = typeof item === 'string' ? { type: item } : (item || {});
              return {
                id: itemObj.id || `${phaseId}-item-${iIndex}`,
                type: itemObj.type || 'doc',
                source: itemObj.source || '',
                url: itemObj.url || '',
                fileName: itemObj.fileName || '',
                pendingFileName: '',
                textContent: itemObj.textContent || '',
                lmsLink: itemObj.lmsLink || '',
                handsonText: itemObj.handsonText || '',
                missionId: itemObj.missionId || '',
                mentorTopic: itemObj.mentorTopic || '',
                assessment: normalizeAssessment(itemObj.assessment),
                collapsed: !!itemObj.collapsed
              };
            });
            return { id: phaseId, name: phaseObj.name || `Phase ${pIndex + 1}`, items };
          });
          return { ...t, phases };
        });
      });
      return normalized;
    }

    function buildTrainingsFromTemplate(role, ids) {
      const template = roleTrainingTemplates[role] || [];
      return template.filter(t => ids.includes(t.id)).map(t => {
        const phases = (t.phases || []).map((p, idx) => ({
          id: p.id || `phase-${idx}`,
          name: getPhaseName(p),
          items: (p.items || []).map((item, itemIdx) => ({
            id: item.id || `item-${itemIdx}`,
            type: item.type || 'doc',
            source: item.source || '',
            url: item.url || '',
            fileName: item.fileName || '',
            pendingFileName: '',
            textContent: item.textContent || '',
            lmsLink: item.lmsLink || '',
            handsonText: item.handsonText || '',
            missionId: item.missionId || '',
            mentorTopic: item.mentorTopic || '',
            assessment: normalizeAssessment(item.assessment),
            collapsed: !!item.collapsed
          }))
        }));
        return {
          ...t,
          role,
          phases,
          currentPhaseIndex: 0,
          currentItemIndex: 0,
          started: false,
          completedItemIds: [],
          mentorMissionId: t.mentorMissionId || '',
          mentorFolderId: t.mentorFolderId || '',
          status: 'not-started',
          chatHistory: [{ from: 'bot', text: `Welcome to ${t.name}! We'll be going through ${phases.length} phases together. Currently, you're in Phase 1: ${getPhaseName(phases[0])}. Let me know when you're ready to begin, or ask me any questions! Also, share a quick intro about yourself so I can tailor the journey.`, time: new Date().toLocaleTimeString() }]
        };
      });
    }

    // Training helpers
    const statusLabel = (s) => s === 'completed' ? { text: 'Completed', cls: 'done' } : s === 'in-progress' ? { text: 'In Progress', cls: 'in' } : { text: 'Not Started', cls: 'not' };
    const progressPct = (t) => Math.round(((t.currentPhaseIndex + 1) / t.phases.length) * 100);

    function ensureTrainingState(t) {
      if (typeof t.currentItemIndex !== 'number') t.currentItemIndex = 0;
      if (typeof t.started !== 'boolean') t.started = false;
      if (!Array.isArray(t.completedItemIds)) t.completedItemIds = [];
      return t;
    }

    function syncTrainingMetadata(training) {
      const templates = roleTrainingTemplates?.[training.role] || [];
      const template = templates.find(t => t.id === training.id);
      if (!template) return;
      if (!training.mentorMissionId && template.mentorMissionId) training.mentorMissionId = template.mentorMissionId;
      if (!training.mentorFolderId && template.mentorFolderId) training.mentorFolderId = template.mentorFolderId;
      training.phases = (template.phases || []).map(tplPhase => {
        const existingPhase = (training.phases || []).find(p => p.id === tplPhase.id) || { items: [] };
        const existingItemMap = new Map((existingPhase.items || []).map(i => [i.id, i]));
        const mergedItems = (tplPhase.items || []).map(tplItem => {
          const existingItem = existingItemMap.get(tplItem.id) || {};
          return {
            ...tplItem,
            ...existingItem,
            missionId: existingItem.missionId || tplItem.missionId || '',
            lmsLink: existingItem.lmsLink || tplItem.lmsLink || '',
            handsonText: existingItem.handsonText || tplItem.handsonText || '',
            textContent: existingItem.textContent || tplItem.textContent || ''
          };
        });
        return { ...existingPhase, ...tplPhase, items: mergedItems };
      });
    }

    function setTrainingProgress(training, idx) {
      training.currentPhaseIndex = Math.min(idx, training.phases.length - 1);
      if (idx === 0) training.status = 'not-started';
      else if (idx < training.phases.length - 1) training.status = 'in-progress';
      else training.status = 'completed';
      persistUser(state.currentUser); render();
    }

    function advancePhase(training) {
      if (training.currentPhaseIndex < training.phases.length - 1) setTrainingProgress(training, training.currentPhaseIndex + 1);
      else { training.status = 'completed'; persistUser(state.currentUser); render(); }
    }

      window.handleApproval = async (email, requestId, approved) => {

    function getItemByIndex(training, phaseIndex, itemIndex) {
      const phase = training.phases?.[phaseIndex];
      if (!phase) return null;
      return (phase.items || [])[itemIndex] || null;
    }

      function requiresApproval(item) {
        return item && (item.type === 'lms' || item.type === 'handson');
      }

      function getApprovalRequest(user, trainingId, itemId) {
        const list = (user.approvals || []).filter(r => r.trainingId === trainingId && r.itemId === itemId);
        return list.length ? list[list.length - 1] : null;
      }

      function getPendingApproval(user, trainingId, itemId) {
        return (user.approvals || []).find(r => r.trainingId === trainingId && r.itemId === itemId && r.status === 'pending');
      }

      function requestApproval(user, training, phaseIndex, itemIndex, item) {
        user.approvals = user.approvals || [];
        const existing = getPendingApproval(user, training.id, item.id);
        if (existing) return existing;
      const req = {
        id: `req-${Date.now()}`,
        trainingId: training.id,
        trainingName: training.name,
        phaseIndex,
        itemIndex,
        itemId: item.id,
        itemLabel: activityLabel(item.type),
        type: item.type,
        status: 'pending',
        requestedAt: new Date().toLocaleString()
      };
      user.approvals.push(req);
      return req;
    }

    function completeItemAndAdvance(training, item) {
      if (!training.completedItemIds.includes(item.id)) training.completedItemIds.push(item.id);
      training.currentItemIndex += 1;
      advanceToNextItem(training);
    }

    function resetTrainingProgressFromPhase(training, targetPhaseIndex) {
      const resetItemIds = [];
      (training.phases || []).forEach((phase, phaseIdx) => {
        if (phaseIdx < targetPhaseIndex) return;
        (phase.items || []).forEach(item => {
          resetItemIds.push(item.id);
          if (item && item.type === 'assessment') {
            item.assessmentState = {
              index: 0,
              answers: [],
              completed: false,
              passed: false,
              scoreMarks: 0,
              totalMarks: 0,
              scorePct: 0,
              startedAt: 0,
              endsAt: 0,
              remainingSeconds: 0,
              timedOut: false,
              retryCount: 0
            };
          }
          if (item && item.type === 'ai-chat') {
            item.autoMentorStarted = false;
          }
        });
      });
      training.completedItemIds = (training.completedItemIds || []).filter(id => !resetItemIds.includes(id));
      if (Array.isArray(state.currentUser?.approvals)) {
        state.currentUser.approvals = state.currentUser.approvals.filter(req => {
          if (req.trainingId !== training.id) return true;
          return req.phaseIndex < targetPhaseIndex;
        });
      }
      training.currentPhaseIndex = targetPhaseIndex;
      training.currentItemIndex = 0;
      training.started = true;
      training.status = 'in-progress';
      training.lastAutoMentorItemId = '';
      training.lastAssessmentEntryKey = '';
      training.chatHistory = [];
      state.showMentor = false;
      state.mentorReason = '';
      state.mentorPending = false;
      ensureCurrentItem(training);
    }

    function advanceToNextItem(training) {
      const phases = training.phases || [];
      while (training.currentPhaseIndex < phases.length) {
        const items = phases[training.currentPhaseIndex]?.items || [];
        if (training.currentItemIndex < items.length) return;
        training.currentPhaseIndex += 1;
        training.currentItemIndex = 0;
      }
      training.status = 'completed';
    }

    function ensureCurrentItem(training) {
      const phases = training.phases || [];
      while (training.currentPhaseIndex < phases.length) {
        const items = phases[training.currentPhaseIndex]?.items || [];
        if (training.currentItemIndex < items.length) return;
        training.currentPhaseIndex += 1;
        training.currentItemIndex = 0;
      }
    }

    // Chat bot
    function botReply(training, text) {
      const lower = text.toLowerCase();
      if (lower.includes('phase') || lower.includes('next')) return `You're on "${training.phases[training.currentPhaseIndex]}". Want to move to the next phase?`;
      if (lower.includes('help') || lower.includes('stuck')) return 'Try checking the phase checklist and examples. I can also summarize the key steps.';
      if (lower.includes('summary')) return 'Summary: focus on the objectives of this phase, validate data, and capture learnings in your notes.';
      if (lower.includes('security')) return 'Security reminder: follow least-privilege, encrypt in transit, and log access changes.';
      if (lower.includes('api')) return 'API tip: test with small payloads first, inspect response codes, and capture sample requests.';
      return 'Noted. Let me know if you want a summary or to move forward.';
    }

    function sendMessage(text) {
      if (state.mentorPending) return;
      if (!text.trim()) return;
      const t = state.selectedTraining;
      t.chatHistory.push({ from: 'user', text, time: new Date().toLocaleTimeString() });
      persistUser(state.currentUser);
      renderChat();
      const currentItem = getCurrentTrainingItem();
      const mentorActive = state.showMentor || (currentItem && currentItem.type === 'ai-chat');
      if (mentorActive) return sendMentorMessage(text, currentItem);
      const reply = botReply(t, text);
      setTimeout(() => {
        t.chatHistory.push({ from: 'bot', text: reply, time: new Date().toLocaleTimeString() });
        persistUser(state.currentUser);
        renderChat();
      }, 250);
    }

    function getCurrentTrainingItem() {
      const t = state.selectedTraining;
      if (!t) return null;
      const phase = t.phases?.[t.currentPhaseIndex];
      return phase?.items?.[t.currentItemIndex] || null;
    }

    function refreshMentorUi() {
      if (state.view === 'training') {
        render();
        return;
      }
      renderChat();
    }

    function buildMentorPayload(item, phase, missionId, extraMessages = [], baseMessages = null) {
      const t = state.selectedTraining;
      const phaseName = getPhaseName(phase);
      const isDocumentActivity = item.type === 'doc' && !!item.fileName && !!t.mentorFolderId;
      const documentPrompt = isDocumentActivity
        ? `Read only the selected training document "${item.fileName}" for "${phaseName || t.name || 'this phase'}". Start with a concise study guide that covers: 1. what the document is about, 2. the most important concepts or configuration points, 3. what the trainee should focus on, and 4. any cautions, dependencies, or follow-up questions. Ignore unrelated documents. If the selected document is unavailable, say that clearly.`
        : '';
      const messages = Array.isArray(baseMessages)
        ? baseMessages
        : t.chatHistory.map(m => ({
            role: m.from === 'user' ? 'user' : 'assistant',
            content: m.text
          }));
      const userContext = {
        email: state.currentUser?.email,
        name: state.currentUser?.name,
        trainingRole: state.currentUser?.trainingRole,
        title: state.currentUser?.title,
        trainingName: t.name,
        phaseName: getPhaseName(phase),
        activityLabel: activityLabel(item.type)
      };
      const systemContent = [
        'You are Matcha AI mentor for APAC AI Training Programs.',
        'Do not ask the trainee to introduce themselves. Do not repeat greetings or re-introduce the program on every reply. Focus only on the current question and provided context.',
        `User: ${userContext.name || 'Unknown'} (${userContext.email || 'N/A'})`,
        `Training role: ${userContext.trainingRole || 'N/A'} | Title: ${userContext.title || 'N/A'}`,
        `Training: ${userContext.trainingName || 'N/A'}`,
        `Phase: ${userContext.phaseName || 'N/A'} | Activity: ${userContext.activityLabel || 'N/A'}`,
        item.mentorTopic ? `Mentor session topic: ${item.mentorTopic}` : '',
        isDocumentActivity ? `Selected document: ${item.fileName}` : '',
        documentPrompt,
        state.mentorReason || ''
      ].join('\n');
      const payload = {
        model: 'gpt-4.1',
        missionId,
        messages: [{ role: 'system', content: systemContent }, ...messages, ...extraMessages],
        userContext
      };
      if (isDocumentActivity) {
        payload.document = {
          fileName: item.fileName,
          folderId: t.mentorFolderId,
          forceUpload: true,
          displayName: item.fileName
        };
        payload.documentPrompt = documentPrompt;
      }
      return payload;
    }

    async function sendMentorMessage(text, item, options = {}) {
      const t = state.selectedTraining;
      const phase = t.phases?.[t.currentPhaseIndex] || {};
      const missionId = item.type === 'ai-chat' ? (item.missionId || '') : (t.mentorMissionId || '');
      if (!missionId) {
        t.chatHistory.push({ from: 'bot', text: 'Mentor session is not configured with a Matcha mission.', time: new Date().toLocaleTimeString() });
        persistUser(state.currentUser);
        refreshMentorUi();
        return;
      }
      state.mentorPending = true;
      const sendBtn = el('send-btn');
      if (sendBtn) sendBtn.disabled = true;
      const pendingId = `mentor-pending-${Date.now()}`;
      const pendingText = item.type === 'doc'
        ? `Uploading and reading ${item.fileName || 'the selected document'} in Matcha. Preparing the guidance now, please wait...`
        : 'Preparing response, please wait...';
      t.chatHistory.push({ from: 'bot', text: pendingText, time: new Date().toLocaleTimeString(), pending: true, id: pendingId });
      persistUser(state.currentUser);
      refreshMentorUi();
      const extraMessages = options.autoKickoff
        ? [{ role: 'user', content: options.kickoffText || 'Please begin the mentor session.' }]
        : [];
      const historyMessages = options.useHistory === false ? [] : null;
      const payload = buildMentorPayload(item, phase, missionId, extraMessages, historyMessages);
      lastMentorRequest = payload;
      try {
        const res = await fetch(`${BASE_PATH}/api/matcha/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (!res.ok) {
          const errorText = await res.text();
          throw new Error(`Mentor request failed (${res.status}): ${errorText}`);
        }
        const data = await res.json();
        const reply = data.content || 'No response.';
        const idx = t.chatHistory.findIndex(m => m.id === pendingId);
        if (idx >= 0) t.chatHistory[idx] = { from: 'bot', text: reply, time: new Date().toLocaleTimeString() };
        else t.chatHistory.push({ from: 'bot', text: reply, time: new Date().toLocaleTimeString() });
        state.mentorPending = false;
        if (sendBtn) sendBtn.disabled = false;
        persistUser(state.currentUser);
        refreshMentorUi();
      } catch (err) {
        const detail = err && err.message ? ` Error: ${err.message}` : '';
        const idx = t.chatHistory.findIndex(m => m.id === pendingId);
        const errorText = `Mentor service is unavailable right now.${detail}`;
        if (idx >= 0) t.chatHistory[idx] = { from: 'bot', text: errorText, time: new Date().toLocaleTimeString() };
        else t.chatHistory.push({ from: 'bot', text: errorText, time: new Date().toLocaleTimeString() });
        state.mentorPending = false;
        if (sendBtn) sendBtn.disabled = false;
        persistUser(state.currentUser);
        refreshMentorUi();
      }
    }

    function autoStartMentorSession(item, force = false) {
      if (!item || item.type !== 'ai-chat') return;
      if (!force && item.autoMentorStarted) return;
      item.autoMentorStarted = true;

    function renderPhaseBuilder() {

            </div>
            <button class="light-btn" id="add-phase-btn" type="button">Add Phase</button>
          </div>
          <div id="phase-list">
            ${phases.map((phase, idx) => `
              <div class="phase-card" data-phase-index="${idx}">
                <div class="phase-header">
                  <div class="phase-title">
                    <span class="badge">Phase ${idx + 1}</span>
                    <input class="phase-name-input" data-phase-index="${idx}" value="${phase.name || ''}" placeholder="Phase name">
                  </div>
                  <button class="light-btn remove-phase-btn" data-phase-index="${idx}" type="button">Remove Phase</button>

                </div>
                <div style="margin-top:8px; display:flex; gap:8px;">
                  <button class="collapse-btn phase-collapse-toggle" data-phase-index="${idx}" data-collapse="${(phase.items || []).length && (phase.items || []).every(item => item.collapsed) ? 'expand' : 'collapse'}" type="button">${(phase.items || []).length && (phase.items || []).every(item => item.collapsed) ? '&#9652;' : '&#9662;'}</button>
                </div>
                <div class="phase-items" data-phase-index="${idx}">
                  ${(phase.items || []).map((item, itemIdx) => `
                    <div class="phase-item" draggable="true" data-phase-index="${idx}" data-item-index="${itemIdx}" style="${activityThemeVars(item.type)}">
                      <span class="drag-handle">::</span>
                      <div class="phase-item-body ${item.collapsed ? 'is-collapsed' : ''}">
                        <div class="phase-item-header">

                          <button class="collapse-btn item-collapse-toggle" data-phase-index="${idx}" data-item-index="${itemIdx}" type="button">${collapseArrow(item.collapsed)}</button>

                        <div class="phase-item-config">

                            <select class="item-source-select" data-phase-index="${idx}" data-item-index="${itemIdx}">

                              <option value="url" ${item.source === 'url' ? 'selected' : ''}>URL link</option>
                              <option value="upload" ${item.source === 'upload' ? 'selected' : ''}>Upload ${(item.type === 'video' ? 'video' : 'PDF')}</option>
                              <option value="library" ${item.source === 'library' ? 'selected' : ''}>Link existing ${(item.type === 'video' ? 'video' : 'PDF')}</option>

                            ${item.source === 'url' ? `
                              <input class="item-url-input" data-phase-index="${idx}" data-item-index="${itemIdx}" placeholder="https://..." value="${item.url || ''}">
                            ` : ''}
                            ${item.source === 'upload' ? `
                              <input class="item-upload-input" data-phase-index="${idx}" data-item-index="${itemIdx}" data-item-id="${item.id}" type="file" accept="${item.type === 'video' ? 'video/*' : 'application/pdf'}">
                              ${!item.fileName ? `<button class="light-btn upload-file-btn" data-phase-index="${idx}" data-item-index="${itemIdx}" data-item-id="${item.id}" type="button" ${item.pendingFileName ? '' : 'disabled'}>Upload File</button>` : ''}
                              <input class="file-name" disabled value="${item.pendingFileName || item.fileName || ''}" placeholder="No file selected">
                              ${item.fileName ? `<a class="training-desc" href="${resourceUrl(item.type, item.fileName)}" target="_blank" rel="noreferrer">Linked: ${item.fileName}</a>` : ''}
                            ` : ''}
                            ${item.source === 'library' ? `
                              <select class="item-library-select" data-phase-index="${idx}" data-item-index="${itemIdx}">
                                <option value="">Select from ${item.type === 'video' ? 'Videos' : 'Documents'} folder</option>
                                ${(item.type === 'video' ? videoLibrary : pdfLibrary).map(file => `

                              </select>
                              ${item.fileName ? `<a class="training-desc" href="${resourceUrl(item.type, item.fileName)}" target="_blank" rel="noreferrer">Linked: ${item.fileName}</a>` : ''}

                          ${item.type === 'text' ? `

                          ${item.type === 'lms' ? `
                            <input class="item-lms-link" data-phase-index="${idx}" data-item-index="${itemIdx}" placeholder="LMS/Workday course link" value="${item.lmsLink || ''}">
                          ` : ''}
                          ${item.type === 'handson' ? `
                            <textarea class="item-handson-input" data-phase-index="${idx}" data-item-index="${itemIdx}" rows="4" placeholder="Describe the hands-on activity">${item.handsonText || ''}</textarea>

                            <select class="item-mission-id" data-phase-index="${idx}" data-item-index="${itemIdx}">
                              <option value="">Select Matcha mission</option>
                              ${missionsCache.map(m => `<option value="${m.id}" ${String(item.missionId) === String(m.id) ? 'selected' : ''}>${m.name || `Mission ${m.id}`}</option>`).join('')}
                            </select>
                            <input class="item-mentor-topic" data-phase-index="${idx}" data-item-index="${itemIdx}" placeholder="Mentor session topic" value="${item.mentorTopic || ''}">
