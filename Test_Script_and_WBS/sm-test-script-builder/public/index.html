<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Script Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  <link rel="stylesheet" href="vendor/theme.css" />
  <link rel="stylesheet" href="styles.css" />
  <script src="session-guard.js"></script>
  <script type="module" src="vendor/material-web.js"></script>
</head>
<body>
  <div id="app">
    <!-- HEADER -->
    <header class="app-header">
      <div class="app-header__brand">
        <img src="images/Altera_logo_rgb_graphicmark.svg" alt="Altera" class="app-header__icon-img" />
        <div>
          <div class="app-header__title">Test Script Generator</div>
          <div class="app-header__subtitle">AI-powered test automation from documentation</div>
        </div>
      </div>
      <div class="app-header__actions">
        <a class="md-btn md-btn--text" href="/" title="Back to APAC Professional Services">
          <span class="material-symbols-outlined">arrow_back</span> APAC Services
        </a>
        <span class="app-header__user" id="userDisplay"></span>
        <md-icon-button id="helpBtn" title="Help">
          <span class="material-symbols-outlined">help_outline</span>
        </md-icon-button>
        <md-text-button id="startOverBtn" style="display:none">
          <span slot="icon" class="material-symbols-outlined">restart_alt</span>
          Start Over
        </md-text-button>
      </div>
    </header>

    <!-- STEPPER NAV -->
    <nav class="stepper" id="stepper">
      <div class="stepper__step" data-step="1">
        <div class="stepper__circle"><span>1</span></div>
        <div class="stepper__label">Upload Document</div>
      </div>
      <div class="stepper__connector"></div>
      <div class="stepper__step" data-step="2">
        <div class="stepper__circle"><span>2</span></div>
        <div class="stepper__label">Select Content</div>
      </div>
      <div class="stepper__connector"></div>
      <div class="stepper__step" data-step="3">
        <div class="stepper__circle"><span>3</span></div>
        <div class="stepper__label">Edit Prompt</div>
      </div>
      <div class="stepper__connector"></div>
      <div class="stepper__step" data-step="4">
        <div class="stepper__circle"><span>4</span></div>
        <div class="stepper__label">Generate Tests</div>
      </div>
      <div class="stepper__connector"></div>
      <div class="stepper__step" data-step="5">
        <div class="stepper__circle"><span>5</span></div>
        <div class="stepper__label">View Results</div>
      </div>
    </nav>

    <!-- WIZARD CONTENT -->
    <main class="wizard-content" id="wizardContent">
      <section class="wizard-step" id="step1"></section>
      <section class="wizard-step" id="step2"></section>
      <section class="wizard-step" id="step3"></section>
      <section class="wizard-step" id="step4"></section>
      <section class="wizard-step" id="step5"></section>
    </main>

    <!-- Help Modal -->
    <div class="help-overlay" id="helpOverlay" style="display:none">
      <div class="help-modal">
        <div class="help-modal__header">
          <span class="help-modal__title">
            <span class="material-symbols-outlined">help_outline</span>
            User Guide
          </span>
          <md-icon-button id="helpCloseBtn" title="Close">
            <span class="material-symbols-outlined">close</span>
          </md-icon-button>
        </div>
        <iframe class="help-modal__iframe" id="helpIframe" src="about:blank"></iframe>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mammoth@1.11.0/mammoth.browser.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
  <script src="vendor/msal-browser.min.js"></script>
  <script src="auth.js"></script>
  <script src="index.js"></script>
</body>
</html>
